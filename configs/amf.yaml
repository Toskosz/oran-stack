################################################################################
# AMF Configuration
# Access and Mobility Management Function - Handles UE attachment and mobility
################################################################################

global:
  max_ue: 4096
  pool:
    packet: 32768

amf:
  sbi:
    server:
      - address: ${AMF_IP}
        port: ${AMF_SBI_PORT}
    client:
      nrf:
        - uri: http://${NRF_IP}:${NRF_SBI_PORT}
      scp:
        - uri: http://${SCP_IP}:${SCP_SBI_PORT}
  ngap:
    server:
      - address: ${AMF_IP}
        port: ${AMF_NGAP_PORT}
  metrics:
    server:
      - address: ${AMF_IP}
        port: ${AMF_METRICS_PORT}
  guami:
    - plmn_id:
        mcc: ${MCC}
        mnc: ${MNC}
      amf_id:
        region: ${AMF_REGION}
        set: ${AMF_SET}
  tai:
    - plmn_id:
        mcc: ${MCC}
        mnc: ${MNC}
      tac: ${TAC}
  plmn_support:
    - plmn_id:
        mcc: ${MCC}
        mnc: ${MNC}
      s_nssai:
        - sst: 1
  security:
    integrity_order:
      - NIA2
      - NIA1
      - NIA0
    ciphering_order:
      - NEA0
      - NEA1
      - NEA2

db_uri: ${MONGODB_URI}

logger:
  file: /var/log/open5gs/amf.log
  level: ${LOG_LEVEL}
