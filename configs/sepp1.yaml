################################################################################
# SEPP Configuration
# Security Edge Protection Proxy - Handles inter-PLMN roaming security
################################################################################

global:
  max_ue: 4096
  pool:
    packet: 32768

sepp:
  sbi:
    server:
      - address: ${SEPP_IP}
        port: 7777
    client:
      nrf:
        - uri: http://${NRF_IP}:${NRF_SBI_PORT}
      scp:
        - uri: http://${SCP_IP}:${SCP_SBI_PORT}
  n32:
    server:
      - sender: ${MCC}${MNC}
        address: ${SEPP_IP}
        port: 7778

db_uri: ${MONGODB_URI}

logger:
  file:
    path: /var/log/open5gs/sepp.log
  level: ${LOG_LEVEL}
