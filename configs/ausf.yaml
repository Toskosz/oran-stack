################################################################################
# AUSF Configuration
# Authentication Server Function - Handles UE authentication
################################################################################

global:
  max_ue: 4096
  pool:
    packet: 32768

ausf:
  sbi:
    server:
      - address: 172.20.0.11
        port: 7777
    client:
      nrf:
        - uri: http://172.20.0.10:7777
      scp:
        - uri: http://172.20.0.200:7777
      udm:
        - uri: http://172.20.0.12:7777

db_uri: ${MONGODB_URI}

logger:
  file:
    path: /var/log/open5gs/ausf.log
  level: ${LOG_LEVEL}
