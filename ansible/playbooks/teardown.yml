# ============================================================================
# Playbook: teardown.yml
# Purpose:  Uninstall all deployed Helm releases and clean up Kubernetes
#           namespaces in reverse order.  The GKE cluster and GCP project
#           are left intact — destroy them manually with 'terraform destroy'
#           if needed.
#
# Usage:
#   ansible-playbook ansible/playbooks/teardown.yml --ask-vault-pass
#
# WARNING: This is DESTRUCTIVE.  It will:
#   - Uninstall all three Helm releases (deletes all K8s resources)
#   - Delete the 5g-core, near-rt-ric, and ran namespaces (removes PVCs)
#
# The play uses 'any_errors_fatal: false' for the Helm uninstalls so that a
# missing release does not abort the rest of the teardown.
# ============================================================================
---
- name: Uninstall Helm releases (RAN → RIC → core)
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: false

  tasks:
    - name: Uninstall ran Helm release
      kubernetes.core.helm:
        name:             "{{ helm_releases.ran }}"
        release_namespace: "{{ namespaces.ran }}"
        state: absent
        wait: true
        wait_timeout: "120s"
      ignore_errors: true

    - name: Uninstall near-rt-ric Helm release
      kubernetes.core.helm:
        name:             "{{ helm_releases.ric }}"
        release_namespace: "{{ namespaces.ric }}"
        state: absent
        wait: true
        wait_timeout: "120s"
      ignore_errors: true

    - name: Uninstall 5g-core Helm release
      kubernetes.core.helm:
        name:             "{{ helm_releases.core }}"
        release_namespace: "{{ namespaces.core }}"
        state: absent
        wait: true
        wait_timeout: "180s"
      ignore_errors: true

    # Delete namespaces after releases are gone so PVCs are also removed.
    - name: Delete ran namespace
      kubernetes.core.k8s:
        state: absent
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ namespaces.ran }}"
        wait: true
        wait_timeout: 60
      ignore_errors: true

    - name: Delete near-rt-ric namespace
      kubernetes.core.k8s:
        state: absent
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ namespaces.ric }}"
        wait: true
        wait_timeout: 60
      ignore_errors: true

    - name: Delete 5g-core namespace
      kubernetes.core.k8s:
        state: absent
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ namespaces.core }}"
        wait: true
        wait_timeout: 120
      ignore_errors: true
