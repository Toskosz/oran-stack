# =============================================================================
# Playbook: gcp-vm-create.yml
# Purpose:  Provision two GCP VMs (cp1 + w1) as direct kubeadm cluster nodes.
#           No nested virtualisation. No bootstrap script.
#           The same kubeadm Ansible roles that run against Vagrant VMs run
#           against these GCP VMs.
#
# Pre-requisites:
#   1. gcloud CLI installed and ADC configured:
#        gcloud auth application-default login
#   2. Active project set:
#        gcloud config set project YOUR_PROJECT_ID
#   3. SSH key pair for the cluster VMs:
#        ssh-keygen -t rsa -b 4096 -f ~/.ssh/oran_gcp
#   4. google.cloud Ansible collection installed:
#        ansible-galaxy collection install -r ansible/requirements.yml
#
# Usage:
#   ansible-playbook ansible/playbooks/gcp-vm-create.yml
#
#   # Override defaults:
#   ansible-playbook ansible/playbooks/gcp-vm-create.yml \
#     -e gcp_zone=europe-west1-b \
#     -e gcp_cp_machine_type=e2-standard-4
#
# After this playbook:
#   ansible-playbook ansible/playbooks/provision.yml \
#     -i ansible/inventories/gcp.ini
#   ansible-playbook ansible/playbooks/deploy.yml \
#     -i ansible/inventories/gcp.ini --ask-vault-pass
# =============================================================================
---
- name: Provision GCP cluster VMs for O-RAN stack
  hosts: localhost
  connection: local
  gather_facts: false

  roles:
    - role: gcp_vm
