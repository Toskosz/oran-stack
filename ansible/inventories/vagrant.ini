# ============================================================================
# Ansible Inventory — O-RAN Stack (Vagrant kubeadm cluster)
# ============================================================================
# Two-node cluster:
#   cp1 (192.168.56.10) — control-plane
#   w1  (192.168.56.11) — worker
#
# Vagrant SSH keys are auto-generated per VM at:
#   .vagrant/machines/<name>/virtualbox/private_key
#
# Helm/Docker plays target the [local] group (Ansible controller).
# ============================================================================

[control_plane]
cp1 ansible_host=192.168.56.10

[workers]
w1 ansible_host=192.168.56.11

[k8s_cluster:children]
control_plane
workers

[k8s_cluster:vars]
ansible_user=vagrant
ansible_ssh_private_key_file={{ playbook_dir }}/../../.vagrant/machines/{{ inventory_hostname }}/virtualbox/private_key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

# Ansible controller — used by build_images and deploy playbooks
[local]
localhost ansible_connection=local
