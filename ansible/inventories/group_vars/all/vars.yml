# ============================================================================
# Ansible Group Variables — O-RAN Stack (kubeadm cluster)
# ============================================================================
# Shared across all roles and playbooks.
#
# SENSITIVE FIELDS: Store secrets in Ansible Vault:
#   ansible-vault create ansible/inventories/group_vars/all/vault.yml
# Then reference them below (vault_* prefix convention).
#
# Override per-run with -e, e.g.:
#   ansible-playbook ... -e dockerhub_username=myuser
# ============================================================================

# ----------------------------------------------------------------------------
# kubeadm / Cluster
# ----------------------------------------------------------------------------
kubernetes_version: "1.30"

pod_cidr:     "10.244.0.0/16"
service_cidr: "10.96.0.0/12"

# control_plane_ip is set per-host in the inventory file (hosts.ini or gcp.ini).
# Example:  cp1  ansible_host=<ext>  control_plane_ip=<int>  ansible_user=ubuntu

# StorageClass for MongoDB PVCs (provisioned by local-path-provisioner).
storage_provisioner: "local-path"

# ----------------------------------------------------------------------------
# CNI: Flannel (primary) + Multus (meta) + OVS-CNI (secondary)
# ----------------------------------------------------------------------------
flannel_manifest_url: "https://raw.githubusercontent.com/flannel-io/flannel/v0.25.4/Documentation/kube-flannel.yml"

multus_manifest_url: "https://raw.githubusercontent.com/k8snetworkplumbingwg/multus-cni/master/deployments/multus-daemonset.yml"

cnao_version: "v0.101.0-rc-0"

# OVS bridges for 3GPP / O-RAN SCTP reference points.
ovs_bridges:
  - name: n2br
    subnet: "10.200.1.0/24"
    nad_name: "n2br-net"
  - name: f1cbr
    subnet: "10.200.2.0/24"
    nad_name: "f1cbr-net"
  - name: e2br
    subnet: "10.200.3.0/24"
    nad_name: "e2br-net"

# Static IPs assigned to pods on secondary OVS interfaces.
# These are passed to Helm charts via --set flags in the deploy roles.
secondary_networks:
  n2:
    nad_name: "n2br-net"
    amf_ip: "10.200.1.2"
    cu_ip: "10.200.1.3"
  f1c:
    nad_name: "f1cbr-net"
    cu_ip: "10.200.2.2"
    du_ip: "10.200.2.3"
  e2:
    nad_name: "e2br-net"
    cu_ip: "10.200.3.2"
    du_ip: "10.200.3.3"
    e2term_ip: "10.200.3.4"

# Namespaces that need NetworkAttachmentDefinitions.
nad_namespaces:
  - "5g-core"
  - "ran"
  - "near-rt-ric"

# ----------------------------------------------------------------------------
# Docker Hub — image push & imagePullSecret
# ----------------------------------------------------------------------------
dockerhub_username: "x0tok"
dockerhub_password: "{{ vault_dockerhub_password }}"

# ----------------------------------------------------------------------------
# Container image names & tags
# ----------------------------------------------------------------------------
images:
  core:
    repository: "{{ dockerhub_username }}/oran-5gcore"
    tag: "latest"
  webui:
    repository: "{{ dockerhub_username }}/oran-webui"
    tag: "latest"
  srsran:
    repository: "{{ dockerhub_username }}/oran-srsran"
    tag: "latest"
  srsue:
    repository: "{{ dockerhub_username }}/oran-srsue"
    tag: "latest"
  xapp_runner:
    repository: "{{ dockerhub_username }}/oran-xapp-runner"
    tag: "latest"
  xapps:
    repository: "{{ dockerhub_username }}/oran-xapps"
    tag: "latest"

dockerfiles:
  core:   "dockerfiles/Dockerfile.5gscore"
  webui:  "dockerfiles/Dockerfile.webui"
  srsran: "dockerfiles/Dockerfile.srsran"
  srsue:  "dockerfiles/Dockerfile.srsue"
  xapp_runner: "dockerfiles/xapp/Dockerfile.runner"
  xapps:  "dockerfiles/xapp/Dockerfile.xapps"

build_contexts:
  core:   "."
  webui:  "."
  srsran: "."
  srsue:  "."

# ----------------------------------------------------------------------------
# Helm chart paths (relative to repo root)
# ----------------------------------------------------------------------------
helm_charts:
  core:       "helm/5g-core"
  ric:        "helm/near-rt-ric"
  ran:        "helm/ran"
  monitoring: "helm/monitoring"
  xapp:       "helm/xapps/xapp"

helm_releases:
  core:       "5g-core"
  ric:        "near-rt-ric"
  ran:        "ran"
  monitoring: "monitoring"
  xapp:       "r4-simple-mon"

helm_timeout: "600s"

# ----------------------------------------------------------------------------
# Kubernetes namespaces
# ----------------------------------------------------------------------------
namespaces:
  core:       "5g-core"
  ric:        "near-rt-ric"
  ran:        "ran"
  monitoring: "monitoring"
  xapp:       "ricxapp"

image_pull_secret_name: "dockerhub-secret"

# ----------------------------------------------------------------------------
# PLMN (must stay in sync with helm/5g-core/values.yaml and helm/ran/values.yaml)
# ----------------------------------------------------------------------------
plmn:
  mcc: "001"
  mnc: "01"
  tac: "1"

# ----------------------------------------------------------------------------
# xApp — simple-mon KPM monitor (E2SM-KPM, ran_func_id=2)
# e2_node_id must match the gNB registered in e2mgr (GET /v1/nodeb/states).
# ----------------------------------------------------------------------------
xapp:
  e2_node_id: "gnbc_001_001_00019b_0"

# ----------------------------------------------------------------------------
# Post-deploy verification — deterministic readiness gates (no restart loops)
# ----------------------------------------------------------------------------
verify_stack:
  # E2 gNB registration gate
  e2_gnb_wait_retries: 30
  e2_gnb_wait_delay: 10
  # One controlled CU→DU restart is allowed when an E2T exists but the gNB
  # is still absent. This recovers srsRAN's non-retrying E2 Setup procedure
  # without turning verification into an unbounded restart loop.
  e2_recovery_restart_enabled: true
  e2_recovery_rollout_timeout: "300s"
  e2_recovery_wait_retries: 30
  e2_recovery_wait_delay: 10
  # UE attach gate
  ue_attach_wait_retries: 36
  ue_attach_wait_delay: 10
  # Fail the deploy if UE attach is not confirmed (set false to only warn)
  ue_attach_required: true
  # xApp functional gate: Deployment available, clean subscription, and KPM
  # indication received before UE attachment is evaluated.
  xapp_deployment_wait_timeout: 600
  xapp_functional_wait_retries: 18
  xapp_functional_wait_delay: 10
