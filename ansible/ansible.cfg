[defaults]
roles_path         = roles
collections_paths  = ~/.ansible/collections

# No default inventory — specify on the command line:
#   -i inventories/hosts.ini       (bring-your-own machines)
#   -i inventories/gcp.ini         (GCP, generated by gcp-vm-create.yml)

verbosity          = 0
retry_files_enabled = false
vault_password_file = ~/.oran_vault_pass
host_key_checking  = False

[ssh_connection]
pipelining = true
