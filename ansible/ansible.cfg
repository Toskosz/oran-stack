[defaults]
# All playbooks and roles live under ansible/
roles_path         = roles
collections_paths  = ~/.ansible/collections

# Default inventory targets the Vagrant VMs (cp1 + w1).
# Helm/Docker plays use the [local] group within the same inventory.
inventory          = inventories/vagrant.ini

# Reduce noise; set to 1 or 2 for more detail
verbosity          = 0

# Retry files create clutter in the repo
retry_files_enabled = false

# Vault password file — create this file locally (never commit it).
# Alternatively, pass --ask-vault-pass on the command line.
vault_password_file = ~/.oran_vault_pass

[ssh_connection]
# SSH pipelining speeds up module execution over Vagrant SSH connections.
pipelining = true
