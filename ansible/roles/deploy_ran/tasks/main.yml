# ============================================================================
# Role: deploy_ran
# Purpose: Deploy the ran Helm chart (srsRAN CU, DU, UE) onto the kubeadm cluster.
#   1. Create namespace with privileged pod-security label
#   2. Create imagePullSecret
#   3. helm upgrade --install ran
#   4. Wait for Deployments
# ============================================================================
---

- name: Set kubeconfig fact
  ansible.builtin.set_fact:
    _kubeconfig: "{{ playbook_dir }}/../../kubeconfig"

# ----------------------------------------------------------------------------
# 1. Create ran namespace
# ----------------------------------------------------------------------------
- name: Create ran namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ _kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ namespaces.ran }}"
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/warn:    privileged
          pod-security.kubernetes.io/audit:   privileged

# ----------------------------------------------------------------------------
# 2. Create Docker Hub imagePullSecret in ran namespace
# ----------------------------------------------------------------------------
- name: Create Docker Hub imagePullSecret in ran namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ _kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name:      "{{ image_pull_secret_name }}"
        namespace: "{{ namespaces.ran }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {{ ({
            "auths": {
              "https://index.docker.io/v1/": {
                "username": dockerhub_username,
                "password": dockerhub_password,
                "auth": (dockerhub_username ~ ":" ~ dockerhub_password) | b64encode
              }
            }
          }) | to_json | b64encode }}
  no_log: true

# ----------------------------------------------------------------------------
# 3. Helm upgrade --install ran
#    amfAddress and e2termAddress use cross-namespace DNS names from
#    helm/ran/values.yaml (amf-ngap-headless.5g-core.svc.cluster.local,
#    e2term.near-rt-ric.svc.cluster.local) — these work identically on
#    kubeadm with CoreDNS.
# ----------------------------------------------------------------------------
- name: Deploy ran Helm chart
  kubernetes.core.helm:
    kubeconfig: "{{ _kubeconfig }}"
    name:             "{{ helm_releases.ran }}"
    chart_ref:        "{{ playbook_dir }}/../../{{ helm_charts.ran }}"
    release_namespace: "{{ namespaces.ran }}"
    create_namespace: false
    wait:             true
    wait_timeout:     "{{ helm_timeout }}"
    values:
      images:
        srsran:
          repository: "{{ images.srsran.repository }}"
          tag:         "{{ images.srsran.tag }}"
        srsue:
          repository: "{{ images.srsue.repository }}"
          tag:         "{{ images.srsue.tag }}"
      plmn:
        mcc: "{{ plmn.mcc }}"
        mnc: "{{ plmn.mnc }}"
        tac: "{{ plmn.tac }}"
  register: helm_ran

- name: Show ran Helm release status
  ansible.builtin.debug:
    msg: "ran release status: {{ helm_ran.status }}"

# ----------------------------------------------------------------------------
# 4. Wait for all RAN Deployments to be Available
# ----------------------------------------------------------------------------
- name: Get all Deployments in ran namespace
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Deployment
    namespace: "{{ namespaces.ran }}"
  register: ran_deployments

- name: Wait for each RAN Deployment to be Available
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Deployment
    name:      "{{ item.metadata.name }}"
    namespace: "{{ namespaces.ran }}"
    wait: true
    wait_condition:
      type:   Available
      status: "True"
    wait_timeout: 300
  loop: "{{ ran_deployments.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

# ----------------------------------------------------------------------------
# 5. Reminder: check UE attachment in logs
# ----------------------------------------------------------------------------
- name: Remind operator to verify UE attachment
  ansible.builtin.debug:
    msg: >-
      RAN stack deployed. Verify UE attachment with:
        kubectl --kubeconfig=kubeconfig logs -n ran deployment/srsue -f
      Look for 'RRC Connected' and 'PDU Session Established' messages.
