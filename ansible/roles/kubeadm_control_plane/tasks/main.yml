---
# kubeadm_control_plane/tasks/main.yml
# Runs on the control-plane node only.
# Initialises the cluster, installs Flannel + Multus + OVS-CNI, local-path-provisioner,
# fetches the kubeconfig to the Ansible controller, and generates the join command.

# ── kubeadm init ───────────────────────────────────────────────────────────────

- name: Check if cluster is already initialised
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Ensure node name resolves in /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "127.0.1.1 {{ inventory_hostname }}"
    regexp: "^127\\.0\\.1\\.1 {{ inventory_hostname }}$"
    state: present

- name: Run kubeadm init
  command: >
    kubeadm init
    --pod-network-cidr={{ pod_cidr }}
    --service-cidr={{ service_cidr }}
    --node-name={{ inventory_hostname }}
    --apiserver-cert-extra-sans={{ ansible_host }}
  when: not kubeadm_admin_conf.stat.exists
  register: kubeadm_init_result

- name: Check if external IP is already a SAN in the API server cert
  command: >
    openssl x509 -noout -text
    -in /etc/kubernetes/pki/apiserver.crt
  register: _cert_text
  changed_when: false
  when: kubeadm_admin_conf.stat.exists

- name: Regenerate API server cert to include external IP as SAN
  block:
    - name: Remove existing API server cert and key
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes/pki/apiserver.crt
        - /etc/kubernetes/pki/apiserver.key

    - name: Regenerate API server cert with extra SANs
      command: >
        kubeadm init phase certs apiserver
        --service-cidr={{ service_cidr }}
        --apiserver-cert-extra-sans={{ ansible_host }}

    - name: Restart kube-apiserver to pick up new cert
      command: >
        crictl rm -f
        $(crictl ps --name kube-apiserver -q 2>/dev/null || echo "")
      register: _apiserver_rm
      changed_when: _apiserver_rm.rc == 0
      failed_when: false

    - name: Wait for API server to come back
      command: >
        kubectl get --raw /healthz
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: _apiserver_health
      retries: 20
      delay: 5
      until: _apiserver_health.rc == 0
      changed_when: false
  when:
    - kubeadm_admin_conf.stat.exists
    - ansible_host not in (_cert_text.stdout | default(''))

- name: Create .kube directory for remote user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy admin.conf to remote user kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Create .kube directory for root
  file:
    path: /root/.kube
    state: directory
    mode: '0700'

- name: Copy admin.conf to root kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: '0600'

# ── Flannel (primary CNI) ──────────────────────────────────────────────────────

- name: Apply Flannel CNI manifest
  command: kubectl apply -f {{ flannel_manifest_url }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: flannel_apply
  changed_when: "'configured' in flannel_apply.stdout or 'created' in flannel_apply.stdout"

- name: Wait for Flannel pods to be Ready
  command: >
    kubectl wait pods -n kube-flannel -l app=flannel
    --for condition=Ready --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Wait for control-plane node to become Ready
  command: >
    kubectl get nodes {{ inventory_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: node_ready
  retries: 30
  delay: 10
  until: node_ready.stdout == "True"
  changed_when: false

# ── Multus (meta-CNI) ──────────────────────────────────────────────────────────

- name: Apply Multus DaemonSet manifest
  command: kubectl apply -f {{ multus_manifest_url }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: multus_apply
  changed_when: "'configured' in multus_apply.stdout or 'created' in multus_apply.stdout"

- name: Wait for Multus pods to be Ready
  command: >
    kubectl wait pods -n kube-system -l app=multus
    --for condition=Ready --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

# ── OVS bridges ────────────────────────────────────────────────────────────────

- name: Create OVS bridges
  command: "ovs-vsctl --may-exist add-br {{ item.name }}"
  loop: "{{ ovs_bridges }}"
  changed_when: true

# ── OVS-CNI (via cluster-network-addons-operator) ──────────────────────────────

- name: Apply cluster-network-addons-operator namespace
  command: >
    kubectl apply -f
    https://github.com/kubevirt/cluster-network-addons-operator/releases/download/{{ cnao_version }}/namespace.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cnao_ns
  changed_when: "'configured' in cnao_ns.stdout or 'created' in cnao_ns.stdout"

- name: Apply cluster-network-addons-operator CRD
  command: >
    kubectl apply -f
    https://github.com/kubevirt/cluster-network-addons-operator/releases/download/{{ cnao_version }}/network-addons-config.crd.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cnao_crd
  changed_when: "'configured' in cnao_crd.stdout or 'created' in cnao_crd.stdout"

- name: Apply cluster-network-addons-operator
  command: >
    kubectl apply -f
    https://github.com/kubevirt/cluster-network-addons-operator/releases/download/{{ cnao_version }}/operator.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cnao_operator
  changed_when: "'configured' in cnao_operator.stdout or 'created' in cnao_operator.stdout"

- name: Apply NetworkAddonsConfig to enable OVS
  command: >
    kubectl apply -f - <<EOF
    apiVersion: networkaddonsoperator.network.kubevirt.io/v1
    kind: NetworkAddonsConfig
    metadata:
      name: cluster
    spec:
      ovs: {}
    EOF
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cnao_config
  changed_when: "'configured' in cnao_config.stdout or 'created' in cnao_config.stdout"

- name: Wait for cluster-network-addons-operator to become available
  command: >
    kubectl wait networkaddonsconfig cluster
    --for condition=Available --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

# ── NetworkAttachmentDefinitions ───────────────────────────────────────────────

- name: Create namespaces for NADs
  command: kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
  loop: "{{ nad_namespaces }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Create NetworkAttachmentDefinitions
  shell: >
    kubectl apply -f - <<EOF
    apiVersion: k8s.cni.cncf.io/v1
    kind: NetworkAttachmentDefinition
    metadata:
      name: {{ item.1.nad_name }}
      namespace: {{ item.0 }}
    spec:
      config: '{
        "cniVersion": "0.3.1",
        "type": "ovs",
        "bridge": "{{ item.1.name }}",
        "ipam": {
          "type": "host-local",
          "subnet": "{{ item.1.subnet }}",
          "rangeStart": "{{ item.1.subnet | regex_replace(\"0/24$\", \"2\") }}",
          "rangeEnd": "{{ item.1.subnet | regex_replace(\"0/24$\", \"254\") }}"
        }
      }'
    EOF
  loop: "{{ nad_namespaces | product(ovs_bridges) | list }}"
  loop_control:
    label: "{{ item.0 }}/{{ item.1.nad_name }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: nad_apply
  changed_when: "'configured' in nad_apply.stdout or 'created' in nad_apply.stdout"

# ── local-path-provisioner (for MongoDB PVC) ───────────────────────────────────

- name: Install Rancher local-path-provisioner
  command: >
    kubectl apply -f
    https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.28/deploy/local-path-storage.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: lpp_apply
  changed_when: "'configured' in lpp_apply.stdout or 'created' in lpp_apply.stdout"

- name: Set local-path as default StorageClass
  command: >
    kubectl patch storageclass local-path
    -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: sc_patch
  changed_when: sc_patch.rc == 0

# ── Generate join command ───────────────────────────────────────────────────────

- name: Generate worker join command
  command: kubeadm token create --print-join-command
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: join_command_raw
  changed_when: false

- name: Set join_command fact (available to worker play via hostvars)
  set_fact:
    join_command: "{{ join_command_raw.stdout }}"

# ── Fetch kubeconfig to Ansible controller ─────────────────────────────────────

- name: Fetch kubeconfig to Ansible controller
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/../../kubeconfig"
    flat: true

- name: Patch kubeconfig server address to use control-plane external IP
  delegate_to: localhost
  become: false
  replace:
    path: "{{ playbook_dir }}/../../kubeconfig"
    regexp: 'server: https://.*:6443'
    replace: "server: https://{{ ansible_host }}:6443"
