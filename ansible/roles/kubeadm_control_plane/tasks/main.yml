---
# kubeadm_control_plane/tasks/main.yml
# Runs on the control-plane node only.
# Initialises the cluster, installs Calico CNI and local-path-provisioner,
# fetches the kubeconfig to the Ansible controller, and generates the join
# command for workers.

# ── kubeadm init ───────────────────────────────────────────────────────────────

- name: Check if cluster is already initialised
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

# Ensure the inventory hostname resolves locally so kubeadm preflight passes.
# On GCP the real hostname differs from the inventory alias (e.g. oran-cp1 vs cp1).
- name: Ensure node name resolves in /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "127.0.1.1 {{ inventory_hostname }}"
    regexp: "^127\\.0\\.1\\.1 {{ inventory_hostname }}$"
    state: present

- name: Run kubeadm init
  command: >
    kubeadm init
    --apiserver-advertise-address={{ control_plane_ip }}
    --pod-network-cidr={{ pod_cidr }}
    --service-cidr={{ service_cidr }}
    --node-name={{ inventory_hostname }}
    --apiserver-cert-extra-sans={{ ansible_host }}
  when: not kubeadm_admin_conf.stat.exists
  register: kubeadm_init_result

# When the cluster was already initialised (kubeadm init skipped), ensure the
# API server cert includes the external IP as a SAN so kubectl from outside GCP
# works without TLS errors.  kubeadm stores the cert-extra-sans in the
# kubeadm-config ConfigMap; we patch it then regenerate only the apiserver cert.
- name: Check if external IP is already a SAN in the API server cert
  command: >
    openssl x509 -noout -text
    -in /etc/kubernetes/pki/apiserver.crt
  register: _cert_text
  changed_when: false
  when: kubeadm_admin_conf.stat.exists

- name: Regenerate API server cert to include external IP as SAN
  block:
    - name: Remove existing API server cert and key
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes/pki/apiserver.crt
        - /etc/kubernetes/pki/apiserver.key

    - name: Regenerate API server cert with extra SANs
      command: >
        kubeadm init phase certs apiserver
        --apiserver-advertise-address={{ control_plane_ip }}
        --service-cidr={{ service_cidr }}
        --apiserver-cert-extra-sans={{ ansible_host }}

    - name: Restart kube-apiserver to pick up new cert
      command: >
        crictl rm -f
        $(crictl ps --name kube-apiserver -q 2>/dev/null || echo "")
      register: _apiserver_rm
      changed_when: _apiserver_rm.rc == 0
      failed_when: false

    - name: Wait for API server to come back
      command: >
        kubectl get --raw /healthz
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: _apiserver_health
      retries: 20
      delay: 5
      until: _apiserver_health.rc == 0
      changed_when: false
  when:
    - kubeadm_admin_conf.stat.exists
    - ansible_host not in (_cert_text.stdout | default(''))

- name: Create .kube directory for remote user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy admin.conf to remote user kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Create .kube directory for root
  file:
    path: /root/.kube
    state: directory
    mode: '0700'

- name: Copy admin.conf to root kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: '0600'

# ── Calico CNI ─────────────────────────────────────────────────────────────────

- name: Download Tigera operator manifest
  get_url:
    url: "https://raw.githubusercontent.com/projectcalico/calico/v{{ calico_version }}/manifests/tigera-operator.yaml"
    dest: /tmp/tigera-operator.yaml
    mode: '0644'

- name: Apply Tigera operator (server-side apply to avoid annotation size limit on large CRDs)
  command: kubectl apply --server-side --force-conflicts -f /tmp/tigera-operator.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: tigera_apply
  changed_when: "'configured' in tigera_apply.stdout or 'created' in tigera_apply.stdout"

- name: Write Calico custom-resources manifest
  copy:
    dest: /tmp/calico-custom-resources.yaml
    mode: '0644'
    content: |
      apiVersion: operator.tigera.io/v1
      kind: Installation
      metadata:
        name: default
      spec:
        calicoNetwork:
          # Pin IP autodetection to ens4 (the GCP primary NIC).
          # Without this, Calico may pick up auxiliary interfaces such as the
          # Open5GS ogstun (10.45.0.0/16) and fail to establish BGP peering.
          nodeAddressAutodetectionV4:
            interface: ens4
          ipPools:
          - name: default-ipv4-ippool
            blockSize: 26
            cidr: {{ pod_cidr }}
            encapsulation: VXLANCrossSubnet
            natOutgoing: Enabled
            nodeSelector: all()
      ---
      apiVersion: operator.tigera.io/v1
      kind: APIServer
      metadata:
        name: default
      spec: {}

- name: Apply Calico custom resources
  command: kubectl apply -f /tmp/calico-custom-resources.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_cr_apply
  changed_when: "'configured' in calico_cr_apply.stdout or 'created' in calico_cr_apply.stdout"

- name: Wait for control-plane node to become Ready
  command: >
    kubectl get nodes {{ inventory_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: node_ready
  retries: 30
  delay: 10
  until: node_ready.stdout == "True"
  changed_when: false

# ── local-path-provisioner (for MongoDB PVC) ───────────────────────────────────

- name: Install Rancher local-path-provisioner
  command: >
    kubectl apply -f
    https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.28/deploy/local-path-storage.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: lpp_apply
  changed_when: "'configured' in lpp_apply.stdout or 'created' in lpp_apply.stdout"

- name: Set local-path as default StorageClass
  command: >
    kubectl patch storageclass local-path
    -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: sc_patch
  changed_when: sc_patch.rc == 0

# ── Generate join command ───────────────────────────────────────────────────────

- name: Generate worker join command
  command: kubeadm token create --print-join-command
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: join_command_raw
  changed_when: false

- name: Set join_command fact (available to worker play via hostvars)
  set_fact:
    join_command: "{{ join_command_raw.stdout }}"

# ── Fetch kubeconfig to Ansible controller ─────────────────────────────────────

- name: Fetch kubeconfig to Ansible controller
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/../../kubeconfig"
    flat: true

- name: Patch kubeconfig server address to use control-plane external IP
  delegate_to: localhost
  become: false
  replace:
    path: "{{ playbook_dir }}/../../kubeconfig"
    regexp: 'server: https://.*:6443'
    replace: "server: https://{{ ansible_host }}:6443"
