# ============================================================================
# Role: deploy_5g_core
# Purpose: Deploy the 5g-core Helm chart onto the kubeadm cluster.
#   1. Create the namespace with privileged pod-security label
#   2. Create the Docker Hub imagePullSecret in the namespace
#   3. helm upgrade --install 5g-core
#   4. Wait for all Deployments and StatefulSets to roll out
# ============================================================================
---

# kubeconfig path — fetched from cp1 by kubeadm_control_plane into repo root
- name: Set kubeconfig fact
  ansible.builtin.set_fact:
    _kubeconfig: "{{ playbook_dir }}/../../kubeconfig"

# ----------------------------------------------------------------------------
# 1. Create namespace (helm chart also creates it, but doing it here first
#    lets us create the imagePullSecret before helm tries to pull images).
#    The privileged label is required for pods that use hostNetwork, SYS_ADMIN,
#    and NET_ADMIN capabilities (UPF, AMF, SMF, and all NFs).
# ----------------------------------------------------------------------------
- name: Create 5g-core namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ _kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ namespaces.core }}"
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/warn:    privileged
          pod-security.kubernetes.io/audit:   privileged

# ----------------------------------------------------------------------------
# 2. Create Docker Hub imagePullSecret
# ----------------------------------------------------------------------------
- name: Create Docker Hub imagePullSecret in 5g-core namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ _kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name:      "{{ image_pull_secret_name }}"
        namespace: "{{ namespaces.core }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {{ ({
            "auths": {
              "https://index.docker.io/v1/": {
                "username": dockerhub_username,
                "password": dockerhub_password,
                "auth": (dockerhub_username ~ ":" ~ dockerhub_password) | b64encode
              }
            }
          }) | to_json | b64encode }}
  no_log: true

# ----------------------------------------------------------------------------
# 3. Helm upgrade --install 5g-core
# ----------------------------------------------------------------------------
- name: Deploy 5g-core Helm chart
  kubernetes.core.helm:
    kubeconfig: "{{ _kubeconfig }}"
    name:             "{{ helm_releases.core }}"
    chart_ref:        "{{ playbook_dir }}/../../{{ helm_charts.core }}"
    release_namespace: "{{ namespaces.core }}"
    create_namespace: false
    wait:             true
    wait_timeout:     "{{ helm_timeout }}"
    values:
      images:
        core:
          repository: "{{ images.core.repository }}"
          tag:         "{{ images.core.tag }}"
        webui:
          repository: "{{ images.webui.repository }}"
          tag:         "{{ images.webui.tag }}"
      plmn:
        mcc: "{{ plmn.mcc }}"
        mnc: "{{ plmn.mnc }}"
        tac: "{{ plmn.tac }}"
      secondaryNetworks:
        n2:
          nadName:  "{{ secondary_networks.n2.nad_name }}"
          amfIP:    "{{ secondary_networks.n2.amf_ip }}"
  register: helm_core

- name: Show 5g-core Helm release status
  ansible.builtin.debug:
    msg: "5g-core release status: {{ helm_core.status }}"

# ----------------------------------------------------------------------------
# 4. Wait for MongoDB pod to be ready (other NFs depend on it)
# ----------------------------------------------------------------------------
- name: Wait for MongoDB pod to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Pod
    label_selectors:
      - "app=mongodb"
    namespace: "{{ namespaces.core }}"
    wait: true
    wait_condition:
      type:   Ready
      status: "True"
    wait_timeout: 300

# ----------------------------------------------------------------------------
# 5. Wait for all 5g-core Deployments to be Available
# ----------------------------------------------------------------------------
- name: Get all Deployments in 5g-core namespace
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Deployment
    namespace: "{{ namespaces.core }}"
  register: core_deployments

- name: Wait for each 5g-core Deployment to be Available
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Deployment
    name:      "{{ item.metadata.name }}"
    namespace: "{{ namespaces.core }}"
    wait: true
    wait_condition:
      type:   Available
      status: "True"
    wait_timeout: 300
  loop: "{{ core_deployments.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

# ----------------------------------------------------------------------------
# 6. Print the AMF NGAP NodePort endpoint (uses node InternalIP on kubeadm)
# ----------------------------------------------------------------------------
- name: Get AMF NGAP NodePort Service
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Service
    name: amf-ngap
    namespace: "{{ namespaces.core }}"
  register: amf_svc

- name: Get cluster node IPs
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Node
  register: cluster_nodes

- name: Show AMF NGAP NodePort endpoint
  ansible.builtin.debug:
    msg: >-
      AMF NGAP SCTP endpoint (NodePort):
      {{ (cluster_nodes.resources[0].status.addresses
         | selectattr('type', 'equalto', 'InternalIP')
         | map(attribute='address')
         | list
         | first | default('UNKNOWN')) }}:{{
      amf_svc.resources[0].spec.ports
         | selectattr('name', 'equalto', 'ngap')
         | map(attribute='nodePort') | first }}
  when: amf_svc.resources | length > 0 and cluster_nodes.resources | length > 0
