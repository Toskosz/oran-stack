---
# gcp_vm/tasks/create.yml
# Provisions two GCP VMs (cp1 + w1) that will be used directly as kubeadm
# cluster nodes — no nested virtualisation, no bootstrap script.
# Uses the google.cloud collection with Application Default Credentials.
#
# After this runs, provision the cluster with:
#   ansible-playbook ansible/playbooks/provision.yml -i ansible/inventories/gcp.ini
#   ansible-playbook ansible/playbooks/deploy.yml    -i ansible/inventories/gcp.ini

# ── Resolve GCP project ───────────────────────────────────────────────────────
- name: Resolve active GCP project from gcloud config
  ansible.builtin.command: gcloud config get-value project
  changed_when: false
  register: _gcp_project_raw
  when: gcp_project == ""

- name: Fail if no active project is set
  ansible.builtin.fail:
    msg: >
      No active GCP project found.
      Run: gcloud config set project YOUR_PROJECT_ID
  when: gcp_project == "" and _gcp_project_raw.stdout | trim == ""

- name: Set gcp_project fact
  ansible.builtin.set_fact:
    _project: "{{ gcp_project if gcp_project != '' else _gcp_project_raw.stdout | trim }}"

- name: Show resolved project
  ansible.builtin.debug:
    msg: "Using GCP project: {{ _project }}"

# ── Enable Compute Engine API ─────────────────────────────────────────────────
- name: Enable Compute Engine API
  ansible.builtin.command: >
    gcloud services enable compute.googleapis.com --project={{ _project }}
  changed_when: false

# ── Read SSH public key ───────────────────────────────────────────────────────
- name: Read SSH public key
  ansible.builtin.slurp:
    src: "{{ gcp_ssh_pub_key_file | expanduser }}"
  register: _ssh_pub_key_raw

- name: Set SSH key metadata value
  ansible.builtin.set_fact:
    # GCP instance metadata format: "user:ssh-rsa AAAA..."
    _ssh_key_meta: "{{ gcp_ssh_user }}:{{ _ssh_pub_key_raw.content | b64decode | trim }}"

# ── Firewall rules ────────────────────────────────────────────────────────────
- name: Create SSH firewall rule (TCP 22 from anywhere)
  google.cloud.gcp_compute_firewall:
    name: oran-ssh
    project: "{{ _project }}"
    network:
      selfLink: "global/networks/{{ gcp_network }}"
    allowed:
      - ip_protocol: tcp
        ports: ["22"]
    source_ranges: ["0.0.0.0/0"]
    target_tags: "{{ gcp_tags }}"
    auth_kind: application
    state: present

- name: Create internal firewall rule (all traffic between cluster nodes)
  google.cloud.gcp_compute_firewall:
    name: oran-internal
    project: "{{ _project }}"
    network:
      selfLink: "global/networks/{{ gcp_network }}"
    allowed:
      - ip_protocol: all
    source_tags: "{{ gcp_tags }}"
    target_tags: "{{ gcp_tags }}"
    auth_kind: application
    state: present

# ── Create cp1 (control-plane) ────────────────────────────────────────────────
- name: Create cp1 control-plane VM
  google.cloud.gcp_compute_instance:
    name: "{{ gcp_cp_name }}"
    project: "{{ _project }}"
    zone: "{{ gcp_zone }}"
    machine_type: "{{ gcp_cp_machine_type }}"
    tags:
      items: "{{ gcp_tags }}"
    disks:
      - auto_delete: true
        boot: true
        initialize_params:
          disk_size_gb: "{{ gcp_disk_size_gb }}"
          disk_type: "{{ gcp_disk_type }}"
          source_image: "projects/{{ gcp_image_project }}/global/images/family/{{ gcp_image_family }}"
    network_interfaces:
      - network:
          selfLink: "global/networks/{{ gcp_network }}"
        access_configs:
          - name: External NAT
            type: ONE_TO_ONE_NAT
    metadata:
      ssh-keys: "{{ _ssh_key_meta }}"
    auth_kind: application
    state: present
  register: _cp1

# ── Create w1 (worker) ────────────────────────────────────────────────────────
- name: Create w1 worker VM
  google.cloud.gcp_compute_instance:
    name: "{{ gcp_w_name }}"
    project: "{{ _project }}"
    zone: "{{ gcp_zone }}"
    machine_type: "{{ gcp_w_machine_type }}"
    tags:
      items: "{{ gcp_tags }}"
    disks:
      - auto_delete: true
        boot: true
        initialize_params:
          disk_size_gb: "{{ gcp_disk_size_gb }}"
          disk_type: "{{ gcp_disk_type }}"
          source_image: "projects/{{ gcp_image_project }}/global/images/family/{{ gcp_image_family }}"
    network_interfaces:
      - network:
          selfLink: "global/networks/{{ gcp_network }}"
        access_configs:
          - name: External NAT
            type: ONE_TO_ONE_NAT
    metadata:
      ssh-keys: "{{ _ssh_key_meta }}"
    auth_kind: application
    state: present
  register: _w1

# ── Extract IPs ───────────────────────────────────────────────────────────────
- name: Set IP facts
  ansible.builtin.set_fact:
    _cp1_external_ip: "{{ _cp1.networkInterfaces[0].accessConfigs[0].natIP }}"
    _cp1_internal_ip: "{{ _cp1.networkInterfaces[0].networkIP }}"
    _w1_external_ip:  "{{ _w1.networkInterfaces[0].accessConfigs[0].natIP }}"
    _w1_internal_ip:  "{{ _w1.networkInterfaces[0].networkIP }}"

- name: Show VM IPs
  ansible.builtin.debug:
    msg:
      - "cp1  external={{ _cp1_external_ip }}  internal={{ _cp1_internal_ip }}"
      - "w1   external={{ _w1_external_ip }}   internal={{ _w1_internal_ip }}"

# ── Wait for SSH ──────────────────────────────────────────────────────────────
- name: Wait for SSH on cp1 (port 22)
  ansible.builtin.wait_for:
    host: "{{ _cp1_external_ip }}"
    port: 22
    delay: 10
    timeout: 180
    state: started

- name: Wait for SSH on w1 (port 22)
  ansible.builtin.wait_for:
    host: "{{ _w1_external_ip }}"
    port: 22
    delay: 10
    timeout: 180
    state: started

# ── Generate gcp.ini inventory ────────────────────────────────────────────────
# Mirrors the group structure of vagrant.ini so provision.yml / deploy.yml /
# teardown.yml work without changes — just pass -i inventories/gcp.ini.
# control_plane_ip is the INTERNAL IP so kubeadm binds to the right interface.
- name: Write gcp.ini dynamic inventory
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/../../ansible/inventories/gcp.ini"
    mode: "0644"
    content: |
      # =========================================================================
      # Ansible Inventory — O-RAN Stack (GCP kubeadm cluster)
      # Auto-generated by gcp-vm-create.yml — do not edit by hand.
      # Delete with: ansible-playbook ansible/playbooks/gcp-vm-delete.yml
      # =========================================================================

      [control_plane]
      cp1 ansible_host={{ _cp1_external_ip }} control_plane_ip={{ _cp1_internal_ip }}

      [workers]
      w1 ansible_host={{ _w1_external_ip }}

      [k8s_cluster:children]
      control_plane
      workers

      [k8s_cluster:vars]
      ansible_user={{ gcp_ssh_user }}
      ansible_ssh_private_key_file={{ gcp_ssh_priv_key_file }}
      ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

      [local]
      localhost ansible_connection=local

# ── Print next steps ──────────────────────────────────────────────────────────
- name: Print next steps
  ansible.builtin.debug:
    msg: |
      ================================================================
      GCP cluster VMs are ready.

        cp1  {{ _cp1_external_ip }}  ({{ gcp_cp_machine_type }})
        w1   {{ _w1_external_ip }}   ({{ gcp_w_machine_type }})

      Bootstrap the Kubernetes cluster:
        ansible-playbook ansible/playbooks/provision.yml \
          -i ansible/inventories/gcp.ini

      Deploy the O-RAN stack:
        ansible-playbook ansible/playbooks/deploy.yml \
          -i ansible/inventories/gcp.ini --ask-vault-pass

      Tear down (Helm + kubeadm reset, keep VMs):
        ansible-playbook ansible/playbooks/teardown.yml \
          -i ansible/inventories/gcp.ini --ask-vault-pass

      Delete VMs entirely:
        ansible-playbook ansible/playbooks/gcp-vm-delete.yml
      ================================================================
