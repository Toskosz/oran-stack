---
# gcp_vm/tasks/main.yml
# Dispatches to create.yml or delete.yml based on gcp_vm_action (default: create).
# All tasks delegate to localhost — the Ansible controller runs gcloud.
# Requires: gcloud CLI authenticated, active project set.

- name: Include create tasks
  ansible.builtin.include_tasks: create.yml
  when: gcp_vm_action | default('create') == 'create'

- name: Include delete tasks
  ansible.builtin.include_tasks: delete.yml
  when: gcp_vm_action | default('create') == 'delete'
