# Wait for the deterministic outcome: gNB registered on E2 in e2mgr.
# This is a readiness gate, not a restart loop.

- name: Set kubeconfig fact
  ansible.builtin.set_fact:
    _kubeconfig: "{{ playbook_dir }}/../../kubeconfig"

- name: Wait for gNB {{ xapp.e2_node_id }} to register in e2mgr
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig={{ _kubeconfig }} exec -n {{ namespaces.ric }} deploy/ric-e2mgr -c e2mgr --
      curl -sf http://localhost:3800/v1/nodeb/states
  register: _nodeb_states
  until: xapp.e2_node_id in _nodeb_states.stdout
  retries: "{{ verify_stack.e2_gnb_wait_retries }}"
  delay: "{{ verify_stack.e2_gnb_wait_delay }}"
  changed_when: false
  failed_when: false

- name: Query E2T readiness before recovery
  when: xapp.e2_node_id not in (_nodeb_states.stdout | default(''))
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig={{ _kubeconfig }} exec -n {{ namespaces.ric }} deploy/ric-e2mgr -c e2mgr --
      curl -sf http://localhost:3800/v1/e2t/list
  register: _e2t_before_recovery
  changed_when: false
  failed_when: false

# This is a single, evidence-driven recovery attempt, not a blind restart
# loop. srsRAN does not retry E2Setup after its procedure aborts. Restarting
# CU then DU is safe only after e2mgr reports an E2T endpoint; the CU Helm
# initContainer enforces the same prerequisite on the replacement pod.
- name: Recover CU and DU when E2T is ready but gNB is absent
  when:
    - verify_stack.e2_recovery_restart_enabled | bool
    - xapp.e2_node_id not in (_nodeb_states.stdout | default(''))
    - '"e2tAddress" in (_e2t_before_recovery.stdout | default(""))'
  block:
    - name: Explain controlled CU/DU E2 recovery
      ansible.builtin.debug:
        msg: >-
          E2T is registered but {{ xapp.e2_node_id }} is absent after the initial
          wait. Restarting CU then DU once because srsRAN does not retry a failed
          E2 Setup procedure.

    - name: Restart CU to reissue E2 Setup
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} rollout restart
          deployment/srs-cu -n {{ namespaces.ran }}
      changed_when: true

    - name: Wait for restarted CU
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} rollout status
          deployment/srs-cu -n {{ namespaces.ran }}
          --timeout={{ verify_stack.e2_recovery_rollout_timeout }}
      changed_when: false

    - name: Restart DU after CU recovery
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} rollout restart
          deployment/srs-du -n {{ namespaces.ran }}
      changed_when: true

    - name: Wait for restarted DU
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} rollout status
          deployment/srs-du -n {{ namespaces.ran }}
          --timeout={{ verify_stack.e2_recovery_rollout_timeout }}
      changed_when: false

    - name: Wait for gNB registration after controlled recovery
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} exec -n {{ namespaces.ric }} deploy/ric-e2mgr -c e2mgr --
          curl -sf http://localhost:3800/v1/nodeb/states
      register: _nodeb_states_recovered
      until: xapp.e2_node_id in _nodeb_states_recovered.stdout
      retries: "{{ verify_stack.e2_recovery_wait_retries }}"
      delay: "{{ verify_stack.e2_recovery_wait_delay }}"
      changed_when: false
      failed_when: false

    - name: Use post-recovery E2 state for final decision
      ansible.builtin.set_fact:
        _nodeb_states: "{{ _nodeb_states_recovered }}"

- name: Collect E2 diagnostics when gNB did not register
  when: xapp.e2_node_id not in (_nodeb_states.stdout | default(''))
  block:
    - name: Dump e2mgr E2T list
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} exec -n {{ namespaces.ric }} deploy/ric-e2mgr -c e2mgr --
          curl -sf http://localhost:3800/v1/e2t/list
      register: _e2t_list
      changed_when: false
      failed_when: false

    - name: Dump CU E2-relevant log lines
      ansible.builtin.shell: |
        kubectl --kubeconfig={{ _kubeconfig }} logs -n {{ namespaces.ran }} deploy/srs-cu --tail=800 \
          | grep -iE 'E2-CU|E2AP|E2 Setup|36421|Near-RT|aborted' | tail -40
      register: _cu_e2_log
      changed_when: false
      failed_when: false

    - name: Dump e2mgr RMR reachability to e2term primary IP
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} exec -n {{ namespaces.ric }} deploy/ric-e2mgr -c e2mgr --
          sh -c "curl -sv --connect-timeout 4 -m 5 telnet://ric-e2term:38000 2>&1 | grep -iE 'connected|refused|timed out' | head -1"
      register: _e2mgr_reach
      changed_when: false
      failed_when: false

    - name: Dump e2mgr RMR_SRC_ID
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} exec -n {{ namespaces.ric }} deploy/ric-e2mgr -c e2mgr --
          sh -c 'printf "RMR_SRC_ID=%s HOSTNAME=%s\n" "${RMR_SRC_ID:-<unset>}" "$(hostname)"'
      register: _e2mgr_src
      changed_when: false
      failed_when: false

    - name: Dump e2term E2AP log tail
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} exec -n {{ namespaces.ric }} deploy/ric-e2term --
          sh -c 'tail -40 /log/e2term.log 2>/dev/null || echo "<no /log/e2term.log>"'
      register: _e2term_log
      changed_when: false
      failed_when: false

    - name: Fail with actionable E2 diagnostics
      ansible.builtin.fail:
        msg: |-
          E2 gNB {{ xapp.e2_node_id }} did NOT register in e2mgr within
          {{ verify_stack.e2_gnb_wait_retries | int * verify_stack.e2_gnb_wait_delay | int }}s.

          e2mgr -> ric-e2term:38000 : {{ _e2mgr_reach.stdout | default('n/a') }}
          e2mgr identity: {{ _e2mgr_src.stdout | default('n/a') }}
          Last e2mgr /v1/nodeb/states: {{ _nodeb_states.stdout | default('') }}
          Last e2mgr /v1/e2t/list: {{ _e2t_list.stdout | default('') }}

          CU E2 log lines:
          {{ _cu_e2_log.stdout | default('') }}

          e2term /log/e2term.log:
          {{ _e2term_log.stdout | default('') }}

          Checklist:
          - e2mgr must have RMR_SRC_ID=ric-e2mgr (not the pod hostname), else
            rtmgr sender-qualified routes for keepalive/E2SetupResponse miss.
          - e2term local-ip must be the primary Flannel pod IP (not OVS).
          - CU has no E2 retry: after "E2 Setup procedure aborted", restart
            srs-cu only after RIC RMR routes are healthy.
          See helm/near-rt-ric/templates/{configmaps,deployments}.yaml and
          docs/E2_STABILIZATION_PLAN.md.

- name: Show E2 registration result
  ansible.builtin.debug:
    msg: "E2 OK — gNB {{ xapp.e2_node_id }} registered in e2mgr"
