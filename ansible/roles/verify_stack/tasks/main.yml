# ============================================================================
# Role: verify_stack
# Purpose: Deterministic readiness gates after the Helm charts are deployed.
# No blind restart loops — deployment ordering and initContainers target a
# first-pass startup. E2 verification permits one evidence-driven CU→DU
# recovery only when e2mgr already has an E2T endpoint, because srsRAN does
# not retry an aborted E2 Setup procedure. It then fails loudly with
# actionable diagnostics if the deterministic gate is still not met.
# ============================================================================

- name: Run pre-xApp E2 verification stage
  ansible.builtin.include_tasks: verify_e2.yml

- name: Run post-xApp functional and UE verification stage
  ansible.builtin.include_tasks: verify_post_xapp.yml
