# ============================================================================
# Role: deploy_xapp
# Purpose: Deploy the simple-mon KPM xApp onto the kubeadm cluster.
#   1. Create ricxapp namespace with privileged pod-security label
#   2. Create imagePullSecret
#   3. helm upgrade --install r4-simple-mon
#   4. Sync RTMgr/xApp RMR routes; re-POST subscription handles to defeat
#      A1Mediator-triggered newrt wipes of mse|12050; wait for KPM indication
#   5. Wait for the xApp Deployment to be Available
# Do not restart E2Term after the xApp subscribes — that drops SCTP and the
# CU will not re-setup, leaving the gNB DISCONNECTED.
# ============================================================================
---

- name: Set kubeconfig fact
  ansible.builtin.set_fact:
    _kubeconfig: "{{ playbook_dir }}/../../kubeconfig"

# ----------------------------------------------------------------------------
# 1. Create ricxapp namespace
# ----------------------------------------------------------------------------
- name: Create ricxapp namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ _kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ namespaces.xapp }}"
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/warn:    privileged
          pod-security.kubernetes.io/audit:   privileged

# ----------------------------------------------------------------------------
# 2. Create Docker Hub imagePullSecret
# ----------------------------------------------------------------------------
- name: Create Docker Hub imagePullSecret in ricxapp namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ _kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name:      "{{ image_pull_secret_name }}"
        namespace: "{{ namespaces.xapp }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {{ ({
            "auths": {
              "https://index.docker.io/v1/": {
                "username": dockerhub_username,
                "password": dockerhub_password,
                "auth": (dockerhub_username ~ ":" ~ dockerhub_password) | b64encode
              }
            }
          }) | to_json | b64encode }}
  no_log: true

# ----------------------------------------------------------------------------
# 3. Helm upgrade --install simple-mon xApp
# ----------------------------------------------------------------------------
- name: Deploy simple-mon xApp Helm chart
  kubernetes.core.helm:
    kubeconfig: "{{ _kubeconfig }}"
    name:             "{{ helm_releases.xapp }}"
    chart_ref:        "{{ playbook_dir }}/../../{{ helm_charts.xapp }}"
    release_namespace: "{{ namespaces.xapp }}"
    create_namespace: false
    wait:             true
    wait_timeout:     "{{ helm_timeout }}"
    values_files:
      - "{{ playbook_dir }}/../../{{ helm_charts.xapp }}/values/simple-mon.yaml"
    values:
      image:
        repository: "{{ images.xapps.repository }}"
        tag:        "{{ images.xapps.tag }}"
      ric:
        namespace: "{{ namespaces.ric }}"
        submgrUri: "http://ric-submgr.{{ namespaces.ric }}:8088/ric/v1"
        appmgrRegisterUri: "http://ric-appmgr.{{ namespaces.ric }}:8080/ric/v1/register"
      xapp:
        e2NodeId: "{{ xapp.e2_node_id }}"
  register: helm_xapp

- name: Show xApp Helm release status
  ansible.builtin.debug:
    msg: "xApp release status: {{ helm_xapp.status }}"

# ----------------------------------------------------------------------------
# 4. RTMgr only syncs xApps from AppMgr at startup. Resync routes after the
#    xApp registers, then restart the xApp so it subscribes against a stable
#    RMR routing table.
# ----------------------------------------------------------------------------
- name: Wait for initial xApp AppMgr registration in logs
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig={{ _kubeconfig }} logs -n {{ namespaces.xapp }}
      deployment/{{ helm_releases.xapp }} -c xapp --tail=200
  register: _xapp_register_logs
  until: >-
    'appmgr register' in (_xapp_register_logs.stdout | default('')) and
    'HTTP 201' in (_xapp_register_logs.stdout | default(''))
  retries: 30
  delay: 5
  changed_when: false

- name: Restart RTMgr so it reloads xApps from AppMgr
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig={{ _kubeconfig }} rollout restart
      deployment/ric-rtmgr -n {{ namespaces.ric }}
  changed_when: true

- name: Wait for RTMgr rollout after xApp registration
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig={{ _kubeconfig }} rollout status
      deployment/ric-rtmgr -n {{ namespaces.ric }} --timeout=300s
  changed_when: false

- name: Wait for RTMgr to push platform routes to the xApp
  ansible.builtin.shell: |
    set -euo pipefail
    kubectl --kubeconfig={{ _kubeconfig }} logs -n {{ namespaces.ric }} \
      deployment/ric-rtmgr -c rtmgr --since=10m | \
      rg -q 'Update Routes to Endpoint: service-ricxapp-{{ helm_releases.xapp }}-rmr\.{{ namespaces.xapp }}:4561 successful'
  args:
    executable: /bin/bash
  register: _rtmgr_route_push
  until: _rtmgr_route_push.rc == 0
  retries: 36
  delay: 5
  changed_when: false

- name: Restart xApp so it subscribes only after RTMgr route sync
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig={{ _kubeconfig }} rollout restart
      deployment/{{ helm_releases.xapp }} -n {{ namespaces.xapp }}
  changed_when: true

- name: Wait for xApp Deployment to be Available after route sync
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Deployment
    name:      "{{ helm_releases.xapp }}"
    namespace: "{{ namespaces.xapp }}"
    wait: true
    wait_condition:
      type:   Available
      status: "True"
    wait_timeout: "{{ verify_stack.xapp_deployment_wait_timeout }}"

- name: Wait for xApp AppMgr registration after route sync restart
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig={{ _kubeconfig }} logs -n {{ namespaces.xapp }}
      deployment/{{ helm_releases.xapp }} -c xapp --tail=200
  register: _xapp_register_logs_after_restart
  until: >-
    'appmgr register' in (_xapp_register_logs_after_restart.stdout | default('')) and
    'HTTP 201' in (_xapp_register_logs_after_restart.stdout | default(''))
  retries: 30
  delay: 5
  changed_when: false

- name: Wait for xApp to subscribe after route sync restart
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig={{ _kubeconfig }} logs -n {{ namespaces.xapp }}
      deployment/{{ helm_releases.xapp }} -c xapp --tail=200
  register: _xapp_subscribe_logs
  until: >-
    'Subscribe to E2 node ID' in (_xapp_subscribe_logs.stdout | default('')) and
    'Successfully subscribed' in (_xapp_subscribe_logs.stdout | default(''))
  retries: 30
  delay: 5
  changed_when: false

- name: Wait for RTMgr subscription route (12050) installed
  ansible.builtin.shell: |
    set -euo pipefail
    # Do NOT restart E2Term after this: that drops the SCTP association and
    # OCUDU CU does not re-setup E2, leaving the gNB DISCONNECTED and the
    # just-installed 12050 indication route orphaned.
    LOGS=$(kubectl --kubeconfig={{ _kubeconfig }} logs -n {{ namespaces.ric }} \
      deployment/ric-rtmgr -c rtmgr --since=10m)
    echo "$LOGS" | rg -q 'RoutingManager->SubManager Add Request Success'
    echo "$LOGS" | rg -q \
      'Update Routes to Endpoint: service-ricxapp-{{ helm_releases.xapp }}-rmr\.{{ namespaces.xapp }}:4561 successful.*Entries:9'
    echo "$LOGS" | rg -q \
      'Update Routes to Endpoint: ric-e2term:38000 successful.*Entries:9'
  args:
    executable: /bin/bash
  register: _rtmgr_sub_route_push
  until: _rtmgr_sub_route_push.rc == 0
  retries: 36
  delay: 5
  changed_when: false

- name: Keep subscription routes installed and wait for KPM indication
  # rtmgr hardcodes a lookup for Platform component "A1Mediator". When that
  # fails it redistributes a full newrt table (about every 10s) that wipes
  # mse|12050|<subid> routes installed via updatert. The previous approach
  # re-created a repost pod on every Ansible retry, which left gaps (pod
  # delete + recreate + wait-for-Ready) between repost cycles; if a newrt
  # wipe landed in one of those gaps, no indication would ever get through
  # in 18 retries. Instead, start ONE persistent repost pod that keeps
  # reinstalling the route every second for the whole wait window, and let
  # Ansible's retry loop just poll the (unrelated, side-effect-free) xApp
  # logs — no more pod churn racing against the wipe.
  block:
    - name: Extract E2EventInstanceId (subscription_id) for route keep-alive
      ansible.builtin.shell: |
        set -euo pipefail
        XLOG=$(kubectl --kubeconfig={{ _kubeconfig }} logs -n {{ namespaces.xapp }} \
          deployment/{{ helm_releases.xapp }} -c xapp --tail=300)
        SUBID=$(echo "$XLOG" | rg -o 'mapping: .* -> ([0-9]+)' -r '$1' | tail -1 || true)
        [[ -n "${SUBID:-}" && "$SUBID" != "0" ]]
        echo "$SUBID"
      args:
        executable: /bin/bash
      register: _subid_extract
      until: _subid_extract.rc == 0
      retries: 30
      delay: 2
      changed_when: false

    - name: Start persistent route-keeper pod to counteract RTMgr's periodic route wipe
      ansible.builtin.shell: |
        set -euo pipefail
        KC={{ _kubeconfig }}
        NS_XAPP={{ namespaces.xapp }}
        XAPP={{ helm_releases.xapp }}
        EP="service-ricxapp-${XAPP}-rmr.{{ namespaces.xapp }}"
        RTMGR="http://ric-rtmgr.{{ namespaces.ric }}:3800/ric/v1/handles/xapp-subscription-handle"
        SUBID="{{ _subid_extract.stdout | trim }}"

        kubectl --kubeconfig="$KC" delete pod xapp-route-keep -n "$NS_XAPP" \
          --ignore-not-found --wait=true >/dev/null 2>&1 || true

        # Repost every second (well under RTMgrs ~10s newrt wipe cadence)
        # for the entire lifetime of this pod, so there is no window where
        # the specific mse|12050|<subid> route is missing for more than ~1s.
        kubectl --kubeconfig="$KC" run xapp-route-keep -n "$NS_XAPP" --restart=Never \
          --image=curlimages/curl:8.5.0 \
          --overrides='{"spec":{"nodeName":"w1"}}' --command -- \
          sh -c "while true; do
            curl -sf -X POST '$RTMGR' \
              -H 'Content-Type: application/json' \
              -d '{\"address\":\"$EP\",\"port\":4561,\"subscription_id\":$SUBID}' \
              >/dev/null || true
            sleep 1
          done" >/dev/null
        kubectl --kubeconfig="$KC" wait --for=condition=Ready \
          pod/xapp-route-keep -n "$NS_XAPP" --timeout=30s >/dev/null
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for KPM indication while routes are kept alive
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} logs -n {{ namespaces.xapp }}
          deployment/{{ helm_releases.xapp }} -c xapp --tail=300
      register: _xapp_indication_logs
      until: >-
        'RIC Indication Received' in (_xapp_indication_logs.stdout | default(''))
      retries: "{{ verify_stack.xapp_functional_wait_retries }}"
      delay: "{{ verify_stack.xapp_functional_wait_delay }}"
      changed_when: false
  always:
    - name: Stop route-keeper pod
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig={{ _kubeconfig }} delete pod xapp-route-keep
          -n {{ namespaces.xapp }} --ignore-not-found --wait=false
      changed_when: false
      failed_when: false
