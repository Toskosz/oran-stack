# ============================================================================
# Role: deploy_ric
# Purpose: Deploy the near-rt-ric Helm chart onto the kubeadm cluster.
#   1. Create namespace with privileged pod-security label
#   2. Create imagePullSecret
#   3. helm upgrade --install near-rt-ric
#   4. Wait for all Deployments to be Available
#   5. Print the e2term SCTP NodePort endpoint
# ============================================================================
---

- name: Set kubeconfig fact
  ansible.builtin.set_fact:
    _kubeconfig: "{{ playbook_dir }}/../../kubeconfig"

# ----------------------------------------------------------------------------
# 1. Create near-rt-ric namespace
# ----------------------------------------------------------------------------
- name: Create near-rt-ric namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ _kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ namespaces.ric }}"
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/warn:    privileged
          pod-security.kubernetes.io/audit:   privileged

# ----------------------------------------------------------------------------
# 2. Create Docker Hub imagePullSecret
# ----------------------------------------------------------------------------
- name: Create Docker Hub imagePullSecret in near-rt-ric namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ _kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name:      "{{ image_pull_secret_name }}"
        namespace: "{{ namespaces.ric }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {{ ({
            "auths": {
              "https://index.docker.io/v1/": {
                "username": dockerhub_username,
                "password": dockerhub_password,
                "auth": (dockerhub_username ~ ":" ~ dockerhub_password) | b64encode
              }
            }
          }) | to_json | b64encode }}
  no_log: true

# ----------------------------------------------------------------------------
# 3. Helm upgrade --install near-rt-ric
#    RIC images are public (O-RAN SC Nexus3); no image overrides needed.
#    Pass secondary network IPs from group_vars so e2term binds to the
#    correct OVS interface static IP.
# ----------------------------------------------------------------------------
- name: Deploy near-rt-ric Helm chart
  kubernetes.core.helm:
    kubeconfig: "{{ _kubeconfig }}"
    name:             "{{ helm_releases.ric }}"
    chart_ref:        "{{ playbook_dir }}/../../{{ helm_charts.ric }}"
    release_namespace: "{{ namespaces.ric }}"
    create_namespace: false
    wait:             true
    wait_timeout:     "{{ helm_timeout }}"
    values:
      secondaryNetworks:
        e2:
          nadName:   "{{ secondary_networks.e2.nad_name }}"
          e2termIP:  "{{ secondary_networks.e2.e2term_ip }}"
      e2termStartupDelaySec: 30
      e2mgr:
        keepAliveResponseTimeoutMs: 120000
        keepAliveDelayMs: 60000
        e2tInstanceDeletionTimeoutMs: 86400000
  register: helm_ric

- name: Show near-rt-ric Helm release status
  ansible.builtin.debug:
    msg: "near-rt-ric release status: {{ helm_ric.status }}"

# ----------------------------------------------------------------------------
# 4. Wait for all RIC Deployments to be Available
# ----------------------------------------------------------------------------
- name: Get all Deployments in near-rt-ric namespace
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Deployment
    namespace: "{{ namespaces.ric }}"
  register: ric_deployments

- name: Wait for each RIC Deployment to be Available
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Deployment
    name:      "{{ item.metadata.name }}"
    namespace: "{{ namespaces.ric }}"
    wait: true
    wait_condition:
      type:   Available
      status: "True"
    wait_timeout: 300
  loop: "{{ ric_deployments.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

# ----------------------------------------------------------------------------
# 5. Print e2term SCTP NodePort endpoint (node InternalIP on kubeadm)
#    For in-cluster DU pods, e2term.near-rt-ric.svc.cluster.local:36421
#    is used directly via ClusterIP (no NodePort needed).
# ----------------------------------------------------------------------------
- name: Get e2term SCTP NodePort Service
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Service
    name: e2term
    namespace: "{{ namespaces.ric }}"
  register: e2term_svc

- name: Get cluster node IPs
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _kubeconfig }}"
    kind: Node
  register: cluster_nodes

- name: Show e2term SCTP NodePort endpoint
  ansible.builtin.debug:
    msg: >-
      e2term SCTP endpoint (NodePort):
      {{ (cluster_nodes.resources[0].status.addresses
         | selectattr('type', 'equalto', 'InternalIP')
         | map(attribute='address')
         | list
         | first | default('UNKNOWN')) }}:{{
      e2term_svc.resources[0].spec.ports
         | selectattr('name', 'equalto', 'e2-sctp')
         | map(attribute='nodePort') | first }}
      (in-cluster: e2term.near-rt-ric.svc.cluster.local:36421)
  when: e2term_svc.resources | length > 0 and cluster_nodes.resources | length > 0
