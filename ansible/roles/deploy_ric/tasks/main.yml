# ============================================================================
# Role: deploy_ric
# Purpose: Deploy the near-rt-ric Helm chart onto the GKE cluster.
#   1. Create namespace
#   2. Create imagePullSecret (needed only for e2term/e2mgr/etc. from Nexus3;
#      those are public, but having the secret present is harmless)
#   3. helm upgrade --install near-rt-ric
#   4. Wait for all Deployments to be Available
#   5. Print the e2term SCTP external IP (needed by srsRAN DU)
# ============================================================================
---

# ----------------------------------------------------------------------------
# 1. Create near-rt-ric namespace
# ----------------------------------------------------------------------------
- name: Create near-rt-ric namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ namespaces.ric }}"

# ----------------------------------------------------------------------------
# 2. Create Docker Hub imagePullSecret (kept consistent with other namespaces)
# ----------------------------------------------------------------------------
- name: Create Docker Hub imagePullSecret in near-rt-ric namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name:      "{{ image_pull_secret_name }}"
        namespace: "{{ namespaces.ric }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {{ ({
            "auths": {
              "https://index.docker.io/v1/": {
                "username": dockerhub_username,
                "password": dockerhub_password,
                "auth": (dockerhub_username ~ ":" ~ dockerhub_password) | b64encode
              }
            }
          }) | to_json | b64encode }}
  no_log: true

# ----------------------------------------------------------------------------
# 3. Helm upgrade --install near-rt-ric
#    The RIC chart uses public images from Nexus3 (no overrides needed for
#    image repos), so we only need to pass the chart with its default values.
# ----------------------------------------------------------------------------
- name: Deploy near-rt-ric Helm chart
  kubernetes.core.helm:
    name:             "{{ helm_releases.ric }}"
    chart_ref:        "{{ playbook_dir }}/../../{{ helm_charts.ric }}"
    release_namespace: "{{ namespaces.ric }}"
    create_namespace: false
    wait:             true
    wait_timeout:     "{{ helm_timeout }}"
  register: helm_ric

- name: Show near-rt-ric Helm release status
  ansible.builtin.debug:
    msg: "near-rt-ric release status: {{ helm_ric.status }}"

# ----------------------------------------------------------------------------
# 4. Wait for all RIC Deployments to be Available
# ----------------------------------------------------------------------------
- name: Get all Deployments in near-rt-ric namespace
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: "{{ namespaces.ric }}"
  register: ric_deployments

- name: Wait for each RIC Deployment to be Available
  kubernetes.core.k8s_info:
    kind: Deployment
    name:      "{{ item.metadata.name }}"
    namespace: "{{ namespaces.ric }}"
    wait: true
    wait_condition:
      type:   Available
      status: "True"
    wait_timeout: 300
  loop: "{{ ric_deployments.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

# ----------------------------------------------------------------------------
# 5. Print e2term SCTP NodePort endpoint
#    NOTE: e2term is now a NodePort service (GCP external LBs reject SCTP).
#    For in-cluster DU pods, e2term.near-rt-ric.svc.cluster.local:36421 works
#    directly via ClusterIP. The NodePort is only needed for an external DU
#    running outside GKE.
# ----------------------------------------------------------------------------
- name: Get e2term SCTP NodePort Service
  kubernetes.core.k8s_info:
    kind: Service
    name: e2term
    namespace: "{{ namespaces.ric }}"
  register: e2term_svc

- name: Get GKE node external IPs
  kubernetes.core.k8s_info:
    kind: Node
  register: cluster_nodes

- name: Show e2term SCTP NodePort endpoint
  ansible.builtin.debug:
    msg: >-
      e2term SCTP endpoint (NodePort, external DU only):
      {{ (cluster_nodes.resources[0].status.addresses
         | selectattr('type', 'equalto', 'ExternalIP')
         | map(attribute='address')
         | list
         | first | default(
           cluster_nodes.resources[0].status.addresses
           | selectattr('type', 'equalto', 'InternalIP')
           | map(attribute='address')
           | list
           | first | default('UNKNOWN')
         )) }}:{{
      e2term_svc.resources[0].spec.ports
         | selectattr('name', 'equalto', 'e2-sctp')
         | map(attribute='nodePort') | first }}
      (in-cluster: e2term.near-rt-ric.svc.cluster.local:36421)
  when: e2term_svc.resources | length > 0 and cluster_nodes.resources | length > 0
