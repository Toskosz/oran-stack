# ============================================================================
# srsUE (User Equipment) Configuration
# ============================================================================
# srsUE from srsRAN_4G - 5G SA UE simulator using ZMQ virtual radio.
#
# Subscriber credentials must match what is provisioned in Open5GS:
#   IMSI: 001010000000001
#   K:    465B5CE8B199B49FAA5F0A2EE238A6BC
#   OPc:  E8ED289DEBA952E4283B54E88E6183CA
#   APN:  internet
#
# ZMQ radio connects to DU at 172.21.0.51 on ran-network.
# ============================================================================

[rf]
freq_offset = 0
tx_gain = 80
rx_gain = 40
srate = 23.04e6
nof_antennas = 1

device_name = zmq
device_args = tx_port=tcp://172.21.0.34:2001,rx_port=tcp://172.21.0.51:2000,base_srate=23.04e6

[rat.eutra]
dl_earfcn = 2850
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1

[pcap]
enable = none
mac_filename = /mnt/srsran/logs/ue_mac.pcap
mac_nr_filename = /mnt/srsran/logs/ue_mac_nr.pcap
nas_filename = /mnt/srsran/logs/ue_nas.pcap

[log]
all_level = info
phy_lib_level = none
all_hex_limit = 32
filename = /mnt/srsran/logs/ue.log
file_max_size = -1

[usim]
mode = soft
algo = milenage
opc  = E8ED289DEBA952E4283B54E88E6183CA
k    = 465B5CE8B199B49FAA5F0A2EE238A6BC
imsi = 001010000000001
imei = 353490069873319

[rrc]
release = 15
ue_category = 4

[nas]
apn = internet
apn_protocol = ipv4

[gw]
netns = ue1

[gui]
enable = false
