# ============================================================================
# AMF — Access and Mobility Management Function
# ============================================================================
# Three Services:
#   1. amf               (ClusterIP)  — SBI HTTP/2 on port 7777, internal only
#   2. amf-ngap          (NodePort)   — SCTP N2/NGAP on port 38412, external
#                                       For real gNBs outside the cluster or
#                                       future use. GCP LBs don't support SCTP
#                                       so NodePort is used instead.
#   3. amf-ngap-headless (headless)   — SCTP N2/NGAP on port 38412, internal
#                                       Used by the srs-cu pod (same cluster).
#                                       clusterIP: None bypasses kube-proxy
#                                       DNAT which breaks SCTP multi-stream
#                                       conntrack (same fix applied to srs-cu
#                                       F1AP service in the ran chart).
#
# The SCTP kernel module must be loaded first — see daemonset-sctp-init.yaml.
{{- if .Values.nf.amf.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amf
  namespace: {{ .Values.namespace }}
  labels:
    app: amf
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amf
  template:
    metadata:
      labels:
        app: amf
    spec:
      {{- include "5g-core.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: amf
          image: {{ .Values.images.core.repository }}:{{ .Values.images.core.tag }}
          imagePullPolicy: {{ .Values.images.core.pullPolicy }}
          command: ["/entrypoint.sh", "./install/bin/open5gs-amfd", "-c", "/open5gs/install/etc/open5gs/amf.yaml"]
          workingDir: /open5gs
          env:
            {{ include "5g-core.commonEnv" . | nindent 12 }}
          ports:
            - containerPort: 7777
              name: sbi
            - containerPort: 38412
              name: ngap
              protocol: SCTP
            - containerPort: 9090
              name: metrics
          {{ include "5g-core.privilegedSecurityContext" . | nindent 10 }}
          volumeMounts:
            {{ include "5g-core.nfVolumeMounts" . | nindent 12 }}
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
      volumes:
        {{ include "5g-core.nfVolumes" . | nindent 8 }}
---
# Internal SBI service (HTTP/2) — used by other NFs to reach AMF.
apiVersion: v1
kind: Service
metadata:
  name: amf
  namespace: {{ .Values.namespace }}
  labels:
    app: amf
spec:
  selector:
    app: amf
  ports:
    - name: sbi
      port: 7777
      targetPort: 7777
---
# External SCTP service for N2/NGAP — for real gNBs outside the cluster.
# NOTE: GCP external load balancers do not support SCTP as a forwarding rule
# protocol, so NodePort is used. externalTrafficPolicy: Local preserves the
# source IP so AMF can identify the gNB correctly.
apiVersion: v1
kind: Service
metadata:
  name: amf-ngap
  namespace: {{ .Values.namespace }}
  labels:
    app: amf
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app: amf
  ports:
    - name: ngap
      port: 38412
      targetPort: 38412
      protocol: SCTP
---
# Headless SCTP service for N2/NGAP — used by srs-cu inside the cluster.
# clusterIP: None means DNS resolves directly to the pod IP, bypassing
# kube-proxy DNAT. This prevents the SCTP conntrack breakage that occurs
# when a NodePort/ClusterIP service rewrites the destination address of an
# established SCTP multi-stream association.
apiVersion: v1
kind: Service
metadata:
  name: amf-ngap-headless
  namespace: {{ .Values.namespace }}
  labels:
    app: amf
spec:
  clusterIP: None
  selector:
    app: amf
  ports:
    - name: ngap
      port: 38412
      targetPort: 38412
      protocol: SCTP
{{- end }}
