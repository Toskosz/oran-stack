# ============================================================================
# NRF — Network Repository Function
# ============================================================================
# First NF to start. All other NFs register with NRF via SBI (HTTP/2 port 7777).
# Depends on MongoDB being ready (initContainer waits for mongo ping).
{{- if .Values.nf.nrf.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrf
  namespace: {{ .Values.namespace }}
  labels:
    app: nrf
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nrf
  template:
    metadata:
      labels:
        app: nrf
    spec:
      {{- include "5g-core.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-mongodb
          image: mongo:7.0
          command:
            - sh
            - -c
            - |
              until mongosh --host mongodb:27017 --eval "db.adminCommand('ping')" --quiet; do
                echo "Waiting for MongoDB..."; sleep 5;
              done
      containers:
        - name: nrf
          image: {{ .Values.images.core.repository }}:{{ .Values.images.core.tag }}
          imagePullPolicy: {{ .Values.images.core.pullPolicy }}
          command: ["/entrypoint.sh", "./install/bin/open5gs-nrfd", "-c", "/open5gs/install/etc/open5gs/nrf.yaml"]
          workingDir: /open5gs
          env:
            {{ include "5g-core.commonEnv" . | nindent 12 }}
          ports:
            - containerPort: 7777
              name: sbi
          {{ include "5g-core.privilegedSecurityContext" . | nindent 10 }}
          volumeMounts:
            {{ include "5g-core.nfVolumeMounts" . | nindent 12 }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        {{ include "5g-core.nfVolumes" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: nrf
  namespace: {{ .Values.namespace }}
  labels:
    app: nrf
spec:
  selector:
    app: nrf
  ports:
    - name: sbi
      port: 7777
      targetPort: 7777
{{- end }}
