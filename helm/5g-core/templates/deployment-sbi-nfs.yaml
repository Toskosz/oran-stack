# ============================================================================
# Stateless SBI NFs: AUSF, UDM, PCF, NSSF, BSF, UDR
# ============================================================================
# These six NFs all follow the identical pattern:
#   - Single Deployment (1 replica)
#   - ClusterIP Service on port 7777 (SBI)
#   - Common privileged securityContext
#   - Config from the open5gs-nf-configs ConfigMap
# They are grouped here to avoid repetitive files.
# ============================================================================

# --- AUSF (Authentication Server Function) -----------------------------------
{{- if .Values.nf.ausf.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ausf
  namespace: {{ .Values.namespace }}
  labels: { app: ausf, app.kubernetes.io/part-of: oran-stack }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ausf }
  template:
    metadata:
      labels: { app: ausf }
    spec:
      {{ include "5g-core.imagePullSecrets" . }}
      containers:
        - name: ausf
          image: {{ .Values.images.core.repository }}:{{ .Values.images.core.tag }}
          imagePullPolicy: {{ .Values.images.core.pullPolicy }}
          command: ["./install/bin/open5gs-ausfde", "-c", "/open5gs/install/etc/open5gs/ausf.yaml"]
          workingDir: /open5gs
          env: {{ include "5g-core.commonEnv" . | nindent 12 }}
          ports: [{ containerPort: 7777, name: sbi }]
          {{ include "5g-core.privilegedSecurityContext" . | nindent 10 }}
          volumeMounts: {{ include "5g-core.nfVolumeMounts" . | nindent 12 }}
          resources: { requests: { cpu: 100m, memory: 128Mi } }
      volumes: {{ include "5g-core.nfVolumes" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ausf
  namespace: {{ .Values.namespace }}
  labels: { app: ausf }
spec:
  selector: { app: ausf }
  ports: [{ name: sbi, port: 7777, targetPort: 7777 }]
{{- end }}
