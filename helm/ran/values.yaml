# ============================================================================
# ran Helm Chart — values.yaml
# ============================================================================

namespace: ran

imagePullSecretName: dockerhub-secret

images:
  ocudu:
    repository: ""        # e.g. "youruser/oran-ocudu"  — set via Ansible group_vars
    tag: "latest"
    pullPolicy: IfNotPresent
  srsue:
    repository: ""        # e.g. "youruser/oran-srsue"
    tag: "latest"
    pullPolicy: IfNotPresent

# The CU sends E2SetupRequest only once. Do not start it until e2mgr has
# registered an E2 termination endpoint. This API is intentionally checked
# before the CU process starts, rather than relying only on pod readiness.
e2Readiness:
  enabled: true
  e2mgrUrl: "http://ric-e2mgr.near-rt-ric.svc.cluster.local:3800"
  pollIntervalSec: 5

# ----------------------------------------------------------------------------
# Secondary networks (Multus/OVS) — static IPs on dedicated OVS bridges.
# SCTP traffic uses these secondary interfaces so it stays on a flat L2 domain
# and is not subject to Flannel overlay encapsulation.
# NAD names must match the NetworkAttachmentDefinitions created in the ran
# namespace by provision.yml.
# ----------------------------------------------------------------------------
secondaryNetworks:
  n2:
    nadName: "n2br-net"
    amfIP: "10.200.1.2"
    cuIP: "10.200.1.3"
  f1c:
    nadName: "f1cbr-net"
    cuIP: "10.200.2.2"
    duIP: "10.200.2.3"
  e2:
    nadName: "e2br-net"
    cuIP: "10.200.3.2"
    duIP: "10.200.3.3"
    e2termIP: "10.200.3.4"

# ----------------------------------------------------------------------------
# Radio / Cell configuration (mirrors .env / du.yml values)
# ----------------------------------------------------------------------------
radio:
  dlArfcn: 368500
  band: 3
  bandwidthMhz: 20
  commonScs: 15
  pci: 1
  srate: "23.04e6"

# ----------------------------------------------------------------------------
# PLMN
# ----------------------------------------------------------------------------
plmn:
  mcc: "001"
  mnc: "01"
  tac: "1"

# ----------------------------------------------------------------------------
# UE credentials (must match Open5GS subscriber database)
# ----------------------------------------------------------------------------
ue:
  imsi: "001010000000001"
  k: "465B5CE8B199B49FAA5F0A2EE238A6BC"
  opc: "E8ED289DEBA952E4283B54E88E6183CA"
  apn: "internet"

# F1 interface port (CU <-> DU user plane)
f1uPort: 2153

# How long (seconds) the DU initContainer waits after the CU is reachable
# before allowing the DU to send F1SetupRequest.
#
# The CU takes ~23 s to purge a stale DU entry after SCTP COMM_LOST (F8).
# The internal F1 setup retry count is hardcoded to 1 (srsRAN behaviour,
# inherited by OCUDU) — if the first attempt hits "Duplicate DU ID" the DU
# gives up. Setting this to 30 s ensures the CU cleanup window has fully
# elapsed before the first attempt is ever made, eliminating the race
# entirely (P4). Re-validate this timing against OCUDU.
duF1SetupHoldOffSec: 30

# ZMQ ports (DU <-> UE virtual radio)
zmq:
  duTxPort: 2000
  duRxPort: 2001

# How long (seconds) the UE initContainer waits after the DU ZMQ port opens
# before starting srsUE. Must exceed duF1SetupHoldOffSec so the cell is active.
ueStartDelaySec: 40

# Enable/disable the UE simulator
deployUE: true

# RollingUpdate needs spare CPU for old+new pods on a single worker; Recreate
# avoids Pending pods when the worker is near its CPU request limit.
# Also required for Multus static IPs (CU/DU) which cannot surge.
deploymentStrategy: Recreate
