# ============================================================================
# srsRAN CU, DU, and UE Deployments + Services
# ============================================================================
# Startup ordering: CU → DU → UE (mirrors depends_on in docker-compose.cudu.yml)
# Implemented with initContainers that wait for the upstream pod's service.
#
# Multi-homing approximation:
#   The original CU had two IPs (core + ran networks). Here a single pod
#   binds to 0.0.0.0 and all interfaces (N2, F1-C, F1-U, NG-U) use the
#   pod IP via their respective Services. The GKE node routes packets
#   correctly through kube-proxy since all services are ClusterIPs.
# ============================================================================

# --- CU (Central Unit) -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srs-cu
  namespace: {{ .Values.namespace }}
  labels:
    app: srs-cu
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: srs-cu
  template:
    metadata:
      labels:
        app: srs-cu
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      initContainers:
        - name: render-config
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              sed "s|\${POD_IP}|${POD_IP}|g" /mnt/srsran/templates/cu.yml.tpl > /mnt/srsran/configs/cu.yml
              echo "Rendered cu.yml with POD_IP=${POD_IP}"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: srsran-templates
              mountPath: /mnt/srsran/templates
              readOnly: true
            - name: srsran-rendered
              mountPath: /mnt/srsran/configs
      containers:
        - name: srs-cu
          image: {{ .Values.images.srsran.repository }}:{{ .Values.images.srsran.tag }}
          imagePullPolicy: {{ .Values.images.srsran.pullPolicy }}
          command: ["/usr/local/bin/srscu", "-c", "/mnt/srsran/configs/cu.yml"]
          securityContext:
            privileged: true
            capabilities:
              add: [NET_ADMIN, SYS_ADMIN, NET_RAW]
          ports:
            - containerPort: 38412
              name: n2-sctp
              protocol: SCTP
            - containerPort: 38472
              name: f1ap
              protocol: SCTP
            - containerPort: 2152
              name: ngu-gtpu
              protocol: UDP
            - containerPort: 2153
              name: f1u
              protocol: UDP
          volumeMounts:
            - name: srsran-rendered
              mountPath: /mnt/srsran/configs
              readOnly: true
            - name: srsran-logs
              mountPath: /mnt/srsran/logs
          stdin: true
          tty: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: srsran-templates
          configMap:
            name: srsran-configs
        - name: srsran-rendered
          emptyDir: {}
        - name: srsran-logs
          emptyDir: {}
---
# Headless Service for CU — clusterIP: None bypasses kube-proxy DNAT entirely.
# DNS resolves srs-cu directly to the CU pod IP so SCTP packets are never
# NAT'd. kube-proxy DNAT causes conntrack to synthesise a spurious SCTP
# SHUTDOWN after F1SetupResponse, leaving the CU in SHUTDOWN_ACK_SENT while
# the DU stays ESTABLISHED (half-open ghost connection).
apiVersion: v1
kind: Service
metadata:
  name: srs-cu
  namespace: {{ .Values.namespace }}
  labels:
    app: srs-cu
spec:
  clusterIP: None
  selector:
    app: srs-cu
  ports:
    - name: f1ap
      port: 38472
      targetPort: 38472
      protocol: SCTP
    - name: f1u
      port: 2153
      targetPort: 2153
      protocol: UDP
---
# --- DU (Distributed Unit) ---------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srs-du
  namespace: {{ .Values.namespace }}
  labels:
    app: srs-du
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: srs-du
  template:
    metadata:
      labels:
        app: srs-du
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      initContainers:
        - name: render-config
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              # Derive a unique gNB-DU-ID from the pod IP so that every new
              # pod gets a fresh DU ID, eliminating the "Duplicate DU ID"
              # F1SetupFailure that occurs when the CU still holds a stale
              # entry for the previous pod.
              #
              # Algorithm: treat the last two octets of POD_IP as a 16-bit
              # number (octet3*256 + octet4). This gives values 0–65535,
              # well within the srsRAN gnb_du_id range of 0–68719476735.
              #   e.g. 10.4.1.33  → 1*256+33  = 289
              #        10.4.0.201 → 0*256+201 = 201
              OCT3=$(echo "${POD_IP}" | cut -d. -f3)
              OCT4=$(echo "${POD_IP}" | cut -d. -f4)
              export GNB_DU_ID=$(( OCT3 * 256 + OCT4 ))
              export POD_IP
              # envsubst replaces both ${POD_IP} and ${GNB_DU_ID} in the template.
              apk add --no-cache gettext > /dev/null 2>&1
              envsubst < /mnt/srsran/templates/du.yml.tpl > /mnt/srsran/configs/du.yml
              echo "Rendered du.yml: POD_IP=${POD_IP} GNB_DU_ID=${GNB_DU_ID}"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: srsran-templates
              mountPath: /mnt/srsran/templates
              readOnly: true
            - name: srsran-rendered
              mountPath: /mnt/srsran/configs
        - name: wait-for-cu
          image: alpine:3.19
          env:
            - name: HOLD_OFF_SEC
              value: "{{ .Values.duF1SetupHoldOffSec }}"
          command:
            - sh
            - -c
            - |
              # Step 1 — wait for DNS to resolve the CU headless service.
              until nslookup srs-cu.ran.svc.cluster.local > /dev/null 2>&1; do
                echo "waiting for srs-cu DNS..."
                sleep 3
              done
              echo "srs-cu DNS resolved — waiting for F1-U UDP port 2153..."
              # Step 2 — wait for the CU process to be up.
              # F1AP uses SCTP which alpine nc cannot probe; use the F1-U UDP
              # port as a proxy — the CU process opens both listeners together.
              # nc -zu sends a UDP probe and succeeds unless ICMP unreachable
              # is received (i.e., the port is closed).
              until nc -zuw1 srs-cu.ran.svc.cluster.local 2153 2>/dev/null; do
                echo "waiting for CU F1-U UDP port 2153..."
                sleep 3
              done
              echo "CU process is up."
              # Step 3 — P4 hold-off: srsRAN's F1 setup retry count is hardcoded
              # to 1. If the DU sends F1SetupRequest while the CU still holds a
              # stale entry for a previous DU pod, the CU rejects with
              # "Duplicate DU ID" and the DU gives up permanently. The CU purges
              # stale entries ~23 s after SCTP COMM_LOST. We wait HOLD_OFF_SEC
              # (default: 30 s) after the CU is reachable to guarantee the cleanup
              # window has elapsed before srsRAN makes its single attempt.
              echo "Holding off ${HOLD_OFF_SEC}s for CU stale-state cleanup (P4)..."
              sleep "${HOLD_OFF_SEC}"
              echo "Hold-off complete — starting DU."
      containers:
        - name: srs-du
          image: {{ .Values.images.srsran.repository }}:{{ .Values.images.srsran.tag }}
          imagePullPolicy: {{ .Values.images.srsran.pullPolicy }}
          command: ["/usr/local/bin/srsdu", "-c", "/mnt/srsran/configs/du.yml"]
          securityContext:
            privileged: true
            capabilities:
              add: [NET_ADMIN, SYS_ADMIN, NET_RAW]
          ports:
            - containerPort: 2153
              name: f1u
              protocol: UDP
            - containerPort: 36421
              name: e2-sctp
              protocol: SCTP
            - containerPort: {{ .Values.zmq.duTxPort }}
              name: zmq-tx
              protocol: TCP
            - containerPort: {{ .Values.zmq.duRxPort }}
              name: zmq-rx
              protocol: TCP
          volumeMounts:
            - name: srsran-rendered
              mountPath: /mnt/srsran/configs
              readOnly: true
            - name: srsran-logs
              mountPath: /mnt/srsran/logs
          stdin: true
          tty: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: srsran-templates
          configMap:
            name: srsran-configs
        - name: srsran-rendered
          emptyDir: {}
        - name: srsran-logs
          emptyDir: {}
---
# ClusterIP for DU — UE uses 'srs-du' as the ZMQ rx_port peer (in ue.conf).
apiVersion: v1
kind: Service
metadata:
  name: srs-du
  namespace: {{ .Values.namespace }}
  labels:
    app: srs-du
spec:
  selector:
    app: srs-du
  ports:
    - name: zmq-tx
      port: {{ .Values.zmq.duTxPort }}
      targetPort: {{ .Values.zmq.duTxPort }}
      protocol: TCP
    - name: zmq-rx
      port: {{ .Values.zmq.duRxPort }}
      targetPort: {{ .Values.zmq.duRxPort }}
      protocol: TCP
---
# --- UE (User Equipment Simulator) -------------------------------------------
{{- if .Values.deployUE }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srsue
  namespace: {{ .Values.namespace }}
  labels:
    app: srsue
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: srsue
  template:
    metadata:
      labels:
        app: srsue
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      initContainers:
        - name: wait-for-du
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z srs-du {{ .Values.zmq.duTxPort }}; do
                echo "waiting for DU ZMQ port..."
                sleep 3
              done
              echo "DU ZMQ port open — waiting 10s for cell to activate..."
              sleep 10
      containers:
        - name: srsue
          image: {{ .Values.images.srsue.repository }}:{{ .Values.images.srsue.tag }}
          imagePullPolicy: {{ .Values.images.srsue.pullPolicy }}
          command: ["/usr/local/bin/srsue", "/mnt/srsran/configs/ue.conf"]
          securityContext:
            privileged: true
            capabilities:
              add: [NET_ADMIN, SYS_ADMIN, NET_RAW]
          ports:
            - containerPort: {{ .Values.zmq.duRxPort }}
              name: zmq-ul
              protocol: TCP
          volumeMounts:
            - name: srsran-templates
              mountPath: /mnt/srsran/configs
              readOnly: true
            - name: srsran-logs
              mountPath: /mnt/srsran/logs
          stdin: true
          tty: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: srsran-templates
          configMap:
            name: srsran-configs
        - name: srsran-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: srsue
  namespace: {{ .Values.namespace }}
  labels:
    app: srsue
spec:
  selector:
    app: srsue
  ports:
    - name: zmq-ul
      port: {{ .Values.zmq.duRxPort }}
      targetPort: {{ .Values.zmq.duRxPort }}
      protocol: TCP
{{- end }}
