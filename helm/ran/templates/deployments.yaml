# ============================================================================
# srsRAN CU, DU, and UE Deployments + Services
# ============================================================================
# Startup ordering: CU → DU → UE (mirrors depends_on in docker-compose.cudu.yml)
# Implemented with initContainers that wait for the upstream pod's service.
#
# SCTP traffic (N2, F1-C, E2AP) uses dedicated OVS secondary interfaces
# (via Multus) with static IPs, eliminating the conntrack/VXLAN flapping
# that occurred when SCTP traversed the Flannel overlay network.
# ============================================================================

# --- CU (Central Unit) -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srs-cu
  namespace: {{ .Values.namespace }}
  labels:
    app: srs-cu
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  strategy:
    type: {{ .Values.deploymentStrategy }}
  selector:
    matchLabels:
      app: srs-cu
  template:
    metadata:
      labels:
        app: srs-cu
      annotations:
        # Multus secondary networks: N2 (CU↔AMF), F1-C (CU↔DU), E2 (CU↔RIC)
        k8s.v1.cni.cncf.io/networks: |
          [
            {
              "name": "{{ .Values.secondaryNetworks.n2.nadName }}",
              "namespace": "{{ .Values.namespace }}",
              "ips": ["{{ .Values.secondaryNetworks.n2.cuIP }}/24"]
            },
            {
              "name": "{{ .Values.secondaryNetworks.f1c.nadName }}",
              "namespace": "{{ .Values.namespace }}",
              "ips": ["{{ .Values.secondaryNetworks.f1c.cuIP }}/24"]
            },
            {
              "name": "{{ .Values.secondaryNetworks.e2.nadName }}",
              "namespace": "{{ .Values.namespace }}",
              "ips": ["{{ .Values.secondaryNetworks.e2.cuIP }}/24"]
            }
          ]
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      initContainers:
        {{ if .Values.e2Readiness.enabled }}
        - name: wait-for-e2t
          image: alpine:3.19
          env:
            - name: E2MGR_URL
              value: {{ .Values.e2Readiness.e2mgrUrl | quote }}
            - name: POLL_INTERVAL_SEC
              value: {{ .Values.e2Readiness.pollIntervalSec | quote }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for an E2T endpoint at ${E2MGR_URL}/v1/e2t/list..."
              until E2T_LIST="$(wget -qO- "${E2MGR_URL}/v1/e2t/list" 2>/dev/null)" \
                && echo "${E2T_LIST}" | grep -q '"e2tAddress"'; do
                echo "e2mgr is unavailable or has no E2T endpoint; retrying in ${POLL_INTERVAL_SEC}s..."
                sleep "${POLL_INTERVAL_SEC}"
              done
              echo "E2T endpoint ready: ${E2T_LIST}"
        {{ end }}
        - name: render-config
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              # Static secondary IPs are injected as env vars by the Downward API
              # equivalent: we pass them directly from Helm values via env vars.
              # envsubst replaces ${N2_IP}, ${F1C_IP}, ${E2_IP} in the template.
              apk add --no-cache gettext > /dev/null 2>&1
              envsubst < /mnt/srsran/templates/cu.yml.tpl > /mnt/srsran/configs/cu.yml
              echo "Rendered cu.yml: N2_IP=${N2_IP} F1C_IP=${F1C_IP} E2_IP=${E2_IP}"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: N2_IP
              value: "{{ .Values.secondaryNetworks.n2.cuIP }}"
            - name: F1C_IP
              value: "{{ .Values.secondaryNetworks.f1c.cuIP }}"
            - name: E2_IP
              value: "{{ .Values.secondaryNetworks.e2.cuIP }}"
            - name: AMF_IP
              value: "{{ .Values.secondaryNetworks.n2.amfIP }}"
            - name: E2TERM_IP
              value: "{{ .Values.secondaryNetworks.e2.e2termIP }}"
          volumeMounts:
            - name: srsran-templates
              mountPath: /mnt/srsran/templates
              readOnly: true
            - name: srsran-rendered
              mountPath: /mnt/srsran/configs
      containers:
        - name: srs-cu
          image: {{ .Values.images.srsran.repository }}:{{ .Values.images.srsran.tag }}
          imagePullPolicy: {{ .Values.images.srsran.pullPolicy }}
          command: ["/usr/local/bin/srscu", "-c", "/mnt/srsran/configs/cu.yml"]
          securityContext:
            privileged: true
            capabilities:
              add: [NET_ADMIN, SYS_ADMIN, NET_RAW]
          ports:
            - containerPort: 38412
              name: n2-sctp
              protocol: SCTP
            - containerPort: 38472
              name: f1ap
              protocol: SCTP
            - containerPort: 2152
              name: ngu-gtpu
              protocol: UDP
            - containerPort: 2153
              name: f1u
              protocol: UDP
          volumeMounts:
            - name: srsran-rendered
              mountPath: /mnt/srsran/configs
              readOnly: true
            - name: srsran-logs
              mountPath: /mnt/srsran/logs
          stdin: true
          tty: true
          readinessProbe:
            exec:
              command: ["sh", "-c", "kill -0 $(pgrep srscu) 2>/dev/null"]
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["sh", "-c", "kill -0 $(pgrep srscu) 2>/dev/null"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: srsran-templates
          configMap:
            name: srsran-configs
        - name: srsran-rendered
          emptyDir: {}
        - name: srsran-logs
          emptyDir: {}
---
# ClusterIP Service for CU — only used for F1-U (UDP) user-plane traffic.
# F1-C (SCTP) uses the static secondary IP directly, bypassing kube-proxy.
apiVersion: v1
kind: Service
metadata:
  name: srs-cu
  namespace: {{ .Values.namespace }}
  labels:
    app: srs-cu
spec:
  selector:
    app: srs-cu
  ports:
    - name: f1u
      port: 2153
      targetPort: 2153
      protocol: UDP
---
# --- DU (Distributed Unit) ---------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srs-du
  namespace: {{ .Values.namespace }}
  labels:
    app: srs-du
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  strategy:
    type: {{ .Values.deploymentStrategy }}
  selector:
    matchLabels:
      app: srs-du
  template:
    metadata:
      labels:
        app: srs-du
      annotations:
        # Multus secondary networks: F1-C (DU↔CU), E2 (DU↔RIC)
        k8s.v1.cni.cncf.io/networks: |
          [
            {
              "name": "{{ .Values.secondaryNetworks.f1c.nadName }}",
              "namespace": "{{ .Values.namespace }}",
              "ips": ["{{ .Values.secondaryNetworks.f1c.duIP }}/24"]
            },
            {
              "name": "{{ .Values.secondaryNetworks.e2.nadName }}",
              "namespace": "{{ .Values.namespace }}",
              "ips": ["{{ .Values.secondaryNetworks.e2.duIP }}/24"]
            }
          ]
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      initContainers:
        - name: render-config
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              # Derive a unique gNB-DU-ID from the pod IP so that every new
              # pod gets a fresh DU ID, eliminating the "Duplicate DU ID"
              # F1SetupFailure that occurs when the CU still holds a stale
              # entry for the previous pod.
              #
              # Algorithm: treat the last two octets of POD_IP as a 16-bit
              # number (octet3*256 + octet4). This gives values 0–65535,
              # well within the srsRAN gnb_du_id range of 0–68719476735.
              OCT3=$(echo "${POD_IP}" | cut -d. -f3)
              OCT4=$(echo "${POD_IP}" | cut -d. -f4)
              export GNB_DU_ID=$(( OCT3 * 256 + OCT4 ))
              # envsubst replaces ${POD_IP}, ${GNB_DU_ID}, ${F1C_IP}, ${CU_F1C_IP},
              # ${E2_IP}, ${E2TERM_IP} in the template.
              apk add --no-cache gettext > /dev/null 2>&1
              envsubst < /mnt/srsran/templates/du.yml.tpl > /mnt/srsran/configs/du.yml
              echo "Rendered du.yml: POD_IP=${POD_IP} GNB_DU_ID=${GNB_DU_ID} F1C_IP=${F1C_IP}"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: F1C_IP
              value: "{{ .Values.secondaryNetworks.f1c.duIP }}"
            - name: CU_F1C_IP
              value: "{{ .Values.secondaryNetworks.f1c.cuIP }}"
            - name: E2_IP
              value: "{{ .Values.secondaryNetworks.e2.duIP }}"
            - name: E2TERM_IP
              value: "{{ .Values.secondaryNetworks.e2.e2termIP }}"
          volumeMounts:
            - name: srsran-templates
              mountPath: /mnt/srsran/templates
              readOnly: true
            - name: srsran-rendered
              mountPath: /mnt/srsran/configs
        - name: wait-for-cu
          image: alpine:3.19
          env:
            - name: HOLD_OFF_SEC
              value: "{{ .Values.duF1SetupHoldOffSec }}"
          command:
            - sh
            - -c
            - |
              # Step 1 — wait for the CU F1-U UDP port via the ClusterIP service.
              # F1-U binds to the primary pod IP (Flannel), not the F1-C secondary
              # IP; probing the static F1-C address would never succeed.
              # F1AP uses SCTP which alpine nc cannot probe; use the F1-U UDP
              # port as a proxy — the CU process opens both listeners together.
              # nc -zu sends a UDP probe and succeeds unless ICMP unreachable
              # is received (i.e., the port is closed).
              echo "Waiting for CU F1-U UDP port at srs-cu:2153..."
              until nc -zuw1 srs-cu 2153 2>/dev/null; do
                echo "waiting for CU F1-U UDP port 2153 at srs-cu..."
                sleep 3
              done
              echo "CU process is up."
              # Step 2 — P4 hold-off: srsRAN's F1 setup retry count is hardcoded
              # to 1. If the DU sends F1SetupRequest while the CU still holds a
              # stale entry for a previous DU pod, the CU rejects with
              # "Duplicate DU ID" and the DU gives up permanently. The CU purges
              # stale entries ~23 s after SCTP COMM_LOST. We wait HOLD_OFF_SEC
              # (default: 30 s) after the CU is reachable to guarantee the cleanup
              # window has elapsed before srsRAN makes its single attempt.
              echo "Holding off ${HOLD_OFF_SEC}s for CU stale-state cleanup (P4)..."
              sleep "${HOLD_OFF_SEC}"
              echo "Hold-off complete — starting DU."
      containers:
        - name: srs-du
          image: {{ .Values.images.srsran.repository }}:{{ .Values.images.srsran.tag }}
          imagePullPolicy: {{ .Values.images.srsran.pullPolicy }}
          command: ["/usr/local/bin/srsdu", "-c", "/mnt/srsran/configs/du.yml"]
          securityContext:
            privileged: true
            capabilities:
              add: [NET_ADMIN, SYS_ADMIN, NET_RAW]
          ports:
            - containerPort: 2153
              name: f1u
              protocol: UDP
            - containerPort: 36421
              name: e2-sctp
              protocol: SCTP
            - containerPort: {{ .Values.zmq.duTxPort }}
              name: zmq-tx
              protocol: TCP
            - containerPort: {{ .Values.zmq.duRxPort }}
              name: zmq-rx
              protocol: TCP
          volumeMounts:
            - name: srsran-rendered
              mountPath: /mnt/srsran/configs
              readOnly: true
            - name: srsran-logs
              mountPath: /mnt/srsran/logs
          stdin: true
          tty: true
          readinessProbe:
            tcpSocket:
              port: {{ .Values.zmq.duTxPort }}
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: {{ .Values.zmq.duTxPort }}
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: srsran-templates
          configMap:
            name: srsran-configs
        - name: srsran-rendered
          emptyDir: {}
        - name: srsran-logs
          emptyDir: {}
---
# ClusterIP for DU — UE uses 'srs-du' as the ZMQ rx_port peer (in ue.conf).
apiVersion: v1
kind: Service
metadata:
  name: srs-du
  namespace: {{ .Values.namespace }}
  labels:
    app: srs-du
spec:
  selector:
    app: srs-du
  ports:
    - name: zmq-tx
      port: {{ .Values.zmq.duTxPort }}
      targetPort: {{ .Values.zmq.duTxPort }}
      protocol: TCP
    - name: zmq-rx
      port: {{ .Values.zmq.duRxPort }}
      targetPort: {{ .Values.zmq.duRxPort }}
      protocol: TCP
---
# --- UE (User Equipment Simulator) -------------------------------------------
{{- if .Values.deployUE }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srsue
  namespace: {{ .Values.namespace }}
  labels:
    app: srsue
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  strategy:
    type: {{ .Values.deploymentStrategy }}
  selector:
    matchLabels:
      app: srsue
  template:
    metadata:
      labels:
        app: srsue
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      initContainers:
        - name: wait-for-du
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z srs-du {{ .Values.zmq.duTxPort }}; do
                echo "waiting for DU ZMQ port..."
                sleep 3
              done
              echo "DU ZMQ port open — waiting {{ .Values.ueStartDelaySec }}s for cell to activate..."
              sleep {{ .Values.ueStartDelaySec }}
      containers:
        - name: srsue
          image: {{ .Values.images.srsue.repository }}:{{ .Values.images.srsue.tag }}
          imagePullPolicy: {{ .Values.images.srsue.pullPolicy }}
          command: ["/usr/local/bin/srsue", "/mnt/srsran/configs/ue.conf"]
          securityContext:
            privileged: true
            capabilities:
              add: [NET_ADMIN, SYS_ADMIN, NET_RAW]
          ports:
            - containerPort: {{ .Values.zmq.duRxPort }}
              name: zmq-ul
              protocol: TCP
          volumeMounts:
            - name: srsran-templates
              mountPath: /mnt/srsran/configs
              readOnly: true
            - name: srsran-logs
              mountPath: /mnt/srsran/logs
          stdin: true
          tty: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: srsran-templates
          configMap:
            name: srsran-configs
        - name: srsran-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: srsue
  namespace: {{ .Values.namespace }}
  labels:
    app: srsue
spec:
  selector:
    app: srsue
  ports:
    - name: zmq-ul
      port: {{ .Values.zmq.duRxPort }}
      targetPort: {{ .Values.zmq.duRxPort }}
      protocol: TCP
{{- end }}
