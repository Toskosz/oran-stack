# ============================================================================
# near-rt-ric Helm Chart — values.yaml
# ============================================================================

namespace: near-rt-ric

imagePullSecretName: dockerhub-secret

# RollingUpdate needs spare CPU for old+new pods on a single worker; Recreate
# avoids Pending pods when the worker is near its CPU request limit.
# Also required for Multus static IP on e2term.
deploymentStrategy: Recreate

# ----------------------------------------------------------------------------
# Secondary network (Multus/OVS) — static IP on the e2br OVS bridge.
# Used for SCTP E2AP traffic between e2term and the CU/DU.
# ----------------------------------------------------------------------------
secondaryNetworks:
  e2:
    nadName: "e2br-net"
    e2termIP: "10.200.3.4"

# ----------------------------------------------------------------------------
# RIC Component Images (pre-built from O-RAN SC Nexus3 registry)
# These are public images; no authentication required to pull them.
# ----------------------------------------------------------------------------
images:
  dbaas:
    # OSC dbaas ships Redis + SDL redismodule (MSETMPUB). Plain redis:6-alpine
    # lacks MSETMPUB, so e2mgr ChangeStatus(CONNECTED) fails with RNIB error and
    # never sends E2SetupResponse (12002).
    repository: nexus3.o-ran-sc.org:10001/o-ran-sc/ric-plt-dbaas
    tag: "0.6.5"
    pullPolicy: IfNotPresent
  e2term:
    repository: nexus3.o-ran-sc.org:10001/o-ran-sc/ric-plt-e2
    tag: "6.0.8"
    pullPolicy: IfNotPresent
  e2mgr:
    repository: nexus3.o-ran-sc.org:10001/o-ran-sc/ric-plt-e2mgr
    tag: "6.0.8"
    pullPolicy: IfNotPresent
  appmgr:
    repository: nexus3.o-ran-sc.org:10001/o-ran-sc/ric-plt-appmgr
    tag: "0.5.4"
    pullPolicy: IfNotPresent
  submgr:
    repository: nexus3.o-ran-sc.org:10001/o-ran-sc/ric-plt-submgr
    tag: "0.10.4"
    pullPolicy: IfNotPresent
  rtmgr:
    repository: nexus3.o-ran-sc.org:10001/o-ran-sc/ric-plt-rtmgr
    tag: "0.9.6"
    pullPolicy: IfNotPresent
  a1mediator:
    repository: nexus3.o-ran-sc.org:10001/o-ran-sc/ric-plt-a1
    tag: "3.2.2"
    pullPolicy: IfNotPresent

# ----------------------------------------------------------------------------
# RIC Identity (must match the DU's E2 setup request)
# ----------------------------------------------------------------------------
ric:
  id: "AACCE"
  mcc: "001"
  mnc: "01"

# ----------------------------------------------------------------------------
# Redis / DBAAS
# ----------------------------------------------------------------------------
dbaas:
  port: 6379

# ----------------------------------------------------------------------------
# e2term startup delay (seconds)
# The sleep before e2term starts prevents the RMR keep-alive race
# condition described in docs/LEARNINGS.md. Implemented as an initContainer.
e2termStartupDelaySec: 30

# e2mgr keep-alive / E2T deletion timers — relaxed for lab stability (see
# docs/E2_STABILIZATION_PLAN.md). Prevents e2mgr from deleting E2T before
# the CU completes E2 Setup.
e2mgr:
  keepAliveResponseTimeoutMs: 120000
  keepAliveDelayMs: 60000
  e2tInstanceDeletionTimeoutMs: 86400000
