      labels:
        app: ric-a1mediator
    spec:
      initContainers:
        - name: wait-for-dbaas
          image: redis:6-alpine
          command: ["sh", "-c", "until redis-cli -h ric-dbaas ping; do echo waiting for dbaas; sleep 2; done"]
      containers:
        - name: a1mediator
          image: {{ .Values.images.a1mediator.repository }}:{{ .Values.images.a1mediator.tag }}
          imagePullPolicy: {{ .Values.images.a1mediator.pullPolicy }}
          env:
            - name: CFG_FILE
              value: /opt/a1-mediator/config.yaml
            - name: A1_CONFIG_FILE
              value: /opt/a1-mediator/config.yaml
            - name: DBAAS_SERVICE_HOST
              value: ric-dbaas
            - name: DBAAS_SERVICE_PORT
              value: "6379"
          ports:
            - containerPort: 10000
