# ============================================================================
# Near-RT RIC Deployments and Services
# ============================================================================
# Startup ordering (mirrors docker-compose.ric.yml depends_on):
#
#   dbaas (healthy) → e2mgr (healthy) → {appmgr, submgr} → rtmgr
#                                                         ↓
#                                                    e2term (after 5s sleep)
#
# Implemented via initContainers that wait for upstream services using
# wget/curl health checks — the Kubernetes equivalent of depends_on.
#
# NOTE: All RIC components reference each other by short hostnames
# (ric-e2mgr, ric-e2term, etc.) in their RMR routing tables. This works
# because all pods are in the same namespace and the Service names match.
# ============================================================================

# --- DBAAS (Redis shared data layer) -----------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ric-dbaas
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-dbaas
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ric-dbaas
  template:
    metadata:
      labels:
        app: ric-dbaas
    spec:
      containers:
        - name: redis
          image: {{ .Values.images.dbaas.repository }}:{{ .Values.images.dbaas.tag }}
          imagePullPolicy: {{ .Values.images.dbaas.pullPolicy }}
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ric-dbaas
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-dbaas
spec:
  selector:
    app: ric-dbaas
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
# --- E2MGR (E2 Manager) -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ric-e2mgr
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-e2mgr
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ric-e2mgr
  template:
    metadata:
      labels:
        app: ric-e2mgr
    spec:
      initContainers:
        - name: wait-for-dbaas
          image: redis:6-alpine
          command: ["sh", "-c", "until redis-cli -h ric-dbaas ping; do echo waiting for dbaas; sleep 2; done"]
      containers:
        - name: e2mgr
          image: {{ .Values.images.e2mgr.repository }}:{{ .Values.images.e2mgr.tag }}
          imagePullPolicy: {{ .Values.images.e2mgr.pullPolicy }}
          env:
            - name: LD_LIBRARY_PATH
              value: /usr/local/lib
            - name: RMR_SEED_RT
              value: /opt/E2Manager/router.txt
            - name: RMR_VCTL_FILE
              value: /tmp/rmr.verbose
            - name: RMR_RTG_SVC
              value: ric-rtmgr:4561
            - name: port
              value: "3800"
            - name: DBAAS_SERVICE_HOST
              value: ric-dbaas
            - name: DBAAS_SERVICE_PORT
              value: "6379"
          ports:
            - containerPort: 3800
              name: http
            - containerPort: 3801
              name: rmr
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3800
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3800
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: e2mgr-config
              mountPath: /opt/E2Manager/resources/configuration.yaml
              subPath: configuration.yaml
            - name: e2mgr-config
              mountPath: /opt/E2Manager/router.txt
              subPath: router.txt
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: e2mgr-config
          configMap:
            name: e2mgr-config
---
apiVersion: v1
kind: Service
metadata:
  name: ric-e2mgr
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-e2mgr
spec:
  selector:
    app: ric-e2mgr
  ports:
    - name: http
      port: 3800
      targetPort: 3800
    - name: rmr
      port: 3801
      targetPort: 3801
    - name: rmr-mgmt
      port: 4561
      targetPort: 4561
---
# --- APPMGR (Application Manager) -------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ric-appmgr
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-appmgr
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ric-appmgr
  template:
    metadata:
