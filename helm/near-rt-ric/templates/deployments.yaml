      volumes:
        - name: appmgr-config
          configMap:
            name: appmgr-config
---
apiVersion: v1
kind: Service
metadata:
  name: ric-appmgr
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-appmgr
spec:
  selector:
    app: ric-appmgr
  ports:
    - name: http
      port: 8080
      targetPort: 8080
