---
# --- RTMGR (Routing Manager) -------------------------------------------------
# hostAliases replaces the extra_hosts hack from docker-compose.ric.yml.
# rtmgr hardcodes the submgr URL as
#   "service-ricplt-submgr-http.ricplt:<port>"
# which doesn't resolve in Kubernetes. hostAliases injects that name into
# the pod's /etc/hosts pointing at the ric-submgr ClusterIP.
#
# lookup() resolves the ClusterIP at Helm render time. On first install the
# Service doesn't exist yet, so lookup returns ""; the initContainer then
# writes the resolved IP into /shared/submgr-ip, which is used by a
# post-start lifecycle hook — but a simpler approach is to template the IP
# directly via lookup with a fallback to the in-cluster DNS resolution done
# by the wait-for-submgr initContainer writing to /etc/hosts via nsenter.
# Instead: use the DNS name that WILL exist once the chart installs, resolved
# at pod start by the initContainer, written into a shared volume, and
# injected via a custom entrypoint that patches /etc/hosts before exec'ing rtmgr.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ric-rtmgr
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-rtmgr
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ric-rtmgr
  template:
    metadata:
      labels:
        app: ric-rtmgr
    spec:
      hostAliases:
        # rtmgr internally dials "rtmgr:4560" for its self-wormhole.
        # Without this alias, DNS fails and rtmgr cannot build any routes.
        - ip: "127.0.0.1"
          hostnames:
            - rtmgr
            - routingmanager
      initContainers:
        - name: wait-for-e2mgr
          image: alpine:3.19
          command: ["sh", "-c", "until wget -qO- http://ric-e2mgr:3800/v1/health; do echo waiting for e2mgr; sleep 3; done"]
        # Resolve the ric-submgr ClusterIP and write it to a shared volume.
        # The main container's command patches /etc/hosts before starting rtmgr,
        # injecting the alias that rtmgr hardcodes internally.
        - name: resolve-submgr-ip
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              until getent hosts ric-submgr > /tmp/out; do
                echo "waiting for ric-submgr DNS..."; sleep 2;
              done
              awk '{print $1}' /tmp/out > /shared/submgr-ip
              echo "Resolved ric-submgr to: $(cat /shared/submgr-ip)"
          volumeMounts:
            - name: shared
              mountPath: /shared
      containers:
        - name: rtmgr
          image: {{ .Values.images.rtmgr.repository }}:{{ .Values.images.rtmgr.tag }}
          imagePullPolicy: {{ .Values.images.rtmgr.pullPolicy }}
          # Patch /etc/hosts with the submgr alias before exec'ing the real binary.
          # This is the Kubernetes equivalent of Docker Compose extra_hosts.
          command:
            - sh
            - -c
            - |
              SUBMGR_IP=$(cat /shared/submgr-ip)
              echo "${SUBMGR_IP}  service-ricplt-submgr-http.ricplt" >> /etc/hosts
              exec /run_rtmgr.sh
          env:
            - name: RMR_SEED_RT
              value: /uta_rtg_ric.rt
            - name: RMR_RTG_SVC
              value: ric-rtmgr:4561
            - name: CFGFILE
              value: /cfg/rtmgr-config.yaml
            - name: RTFILE
              value: /db/rt.json
            - name: DBAAS_SERVICE_HOST
              value: ric-dbaas
            - name: DBAAS_SERVICE_PORT
              value: "6379"
          ports:
            - containerPort: 3800
              name: http
            - containerPort: 4560
              name: rmr
          volumeMounts:
            - name: rtmgr-config
              mountPath: /cfg/rtmgr-config.yaml
              subPath: rtmgr-config.yaml
            # /db/rt.json must be writable — rtmgr writes the computed route
            # table here at runtime. Mount an emptyDir so the ConfigMap seed
            # (read-only subPath) does not block writes.
            - name: rtmgr-db
              mountPath: /db
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: rtmgr-config
          configMap:
            name: rtmgr-config
        - name: rtmgr-db
          emptyDir: {}
        - name: shared
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ric-rtmgr
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-rtmgr
spec:
  selector:
    app: ric-rtmgr
  ports:
    - name: http
      port: 3800
      targetPort: 3800
    - name: rmr
      port: 4560
      targetPort: 4560
    - name: rmr-mgmt
      port: 4561
      targetPort: 4561
---
# --- E2TERM (E2 Termination) --------------------------------------------------
# Two Services:
#   1. ric-e2term (ClusterIP) — RMR ports for internal RIC communication
#   2. e2term (LoadBalancer, SCTP) — external E2 endpoint for the DU
#
# The initContainer sleep implements the documented 5-second startup delay.
# RIC_E2TERM_SERVICE_HOST uses the Downward API to get the pod's own IP,
# replacing the hardcoded 172.22.0.210 from docker-compose.ric.yml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ric-e2term
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-e2term
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ric-e2term
  template:
    metadata:
      labels:
        app: ric-e2term
    spec:
      initContainers:
        - name: wait-for-e2mgr
          image: alpine:3.19
          command: ["sh", "-c", "until wget -qO- http://ric-e2mgr:3800/v1/health; do echo waiting for e2mgr; sleep 3; done"]
        # render-config: copy the read-only ConfigMap into an emptyDir so that
        # startup.sh's `sed -i` calls can write local-ip and external-fqdn.
        # ConfigMap subPath mounts are read-only and cannot be modified in place.
        - name: render-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config-ro/config.conf /config-rw/config.conf
              cp /config-ro/dockerRouter.txt /config-rw/dockerRouter.txt
          volumeMounts:
            - name: e2term-config-ro
              mountPath: /config-ro
            - name: e2term-config-rw
              mountPath: /config-rw
        # The 5-second sleep ensures e2mgr's RMR outbound connection to
        # e2term:3801 is established before e2term opens the SCTP port.
        # Without this, the first E2_TERM_KEEP_ALIVE_RESP fails with
        # RMR_ERR_NOENDPT and triggers the keep-alive death spiral.
        # See docs/LEARNINGS.md for the full diagnosis.
        - name: startup-delay
          image: busybox:1.36
          command: ["sleep", {{ .Values.e2termStartupDelaySec | quote }}]
      containers:
        - name: e2term
          image: {{ .Values.images.e2term.repository }}:{{ .Values.images.e2term.tag }}
          imagePullPolicy: {{ .Values.images.e2term.pullPolicy }}
          command: ["sh", "-c", "./startup.sh"]
          securityContext:
            privileged: true
          env:
            - name: RMR_SEED_RT
              value: /opt/e2/config/dockerRouter.txt
            - name: RMR_RTG_SVC
              value: ric-rtmgr:4561
            - name: RMR_SRC_ID
              value: ric-e2term
            - name: E2TERM_POD_NAME
              value: ric-e2term
            - name: POD_NAME
              value: ric-e2term
            - name: LD_LIBRARY_PATH
              value: /usr/local/lib
            - name: DBAAS_SERVICE_HOST
              value: ric-dbaas
            - name: DBAAS_SERVICE_PORT
              value: "6379"
            # Downward API: inject the pod's own IP as the bind address.
            # Replaces the hardcoded 172.22.0.210 from docker-compose.ric.yml.
            - name: RIC_E2TERM_SERVICE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 38000
              name: rmr
            - containerPort: 36421
              name: e2-sctp
              protocol: SCTP
            - containerPort: 8088
              name: metrics
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          volumeMounts:
            # Use the writable copy produced by the render-config initContainer.
            - name: e2term-config-rw
              mountPath: /opt/e2/config
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
      volumes:
        - name: e2term-config-ro
          configMap:
            name: e2term-config
        - name: e2term-config-rw
          emptyDir: {}
---
# Internal RMR service for e2term — used by other RIC components.
apiVersion: v1
kind: Service
metadata:
  name: ric-e2term
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-e2term
spec:
  selector:
    app: ric-e2term
  ports:
    - name: rmr
      port: 38000
      targetPort: 38000
    - name: metrics
      port: 8088
      targetPort: 8088
    - name: rmr-mgmt
      port: 4561
      targetPort: 4561
---
# External SCTP service for E2 interface — DU connects here.
# Named 'e2term' (without 'ric-' prefix) to match .Values.e2termAddress
# in the ran chart: "e2term.near-rt-ric.svc.cluster.local"
# NOTE: GCP external load balancers do not support SCTP forwarding rules.
# NodePort is used instead; an external DU must target a node IP:nodePort.
# For in-cluster DU pods, the ClusterIP DNS name works directly.
apiVersion: v1
kind: Service
metadata:
  name: e2term
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-e2term
spec:
  type: NodePort
  selector:
    app: ric-e2term
  ports:
    - name: e2-sctp
      port: 36421
      targetPort: 36421
      protocol: SCTP
---
# --- A1MEDIATOR (A1 Policy Interface) ----------------------------------------
