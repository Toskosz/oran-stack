---
# --- RTMGR (Routing Manager) -------------------------------------------------
# hostAliases replaces the extra_hosts hack from docker-compose.ric.yml.
# rtmgr builds the submgr URL as
#   "service-ricplt-submgr-http.ricplt:<port>"
# which doesn't resolve in Kubernetes. hostAliases injects that name into
# the pod's /etc/hosts, mapping it to the ric-submgr ClusterIP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ric-rtmgr
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-rtmgr
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ric-rtmgr
  template:
    metadata:
      labels:
        app: ric-rtmgr
    spec:
      # Kubernetes equivalent of Docker Compose extra_hosts.
      # See docs/LEARNINGS.md — rtmgr hardcodes this K8s-style DNS name.
      hostAliases:
        - ip: "$(RIC_SUBMGR_IP)"
          hostnames:
            - "service-ricplt-submgr-http.ricplt"
      initContainers:
        - name: wait-for-e2mgr
          image: alpine:3.19
          command: ["sh", "-c", "until wget -qO- http://ric-e2mgr:3800/v1/health; do echo waiting for e2mgr; sleep 3; done"]
        - name: resolve-submgr-ip
          image: alpine:3.19
          command: ["sh", "-c", "getent hosts ric-submgr | awk '{print $1}' > /shared/submgr-ip"]
          volumeMounts:
            - name: shared
              mountPath: /shared
      containers:
        - name: rtmgr
          image: {{ .Values.images.rtmgr.repository }}:{{ .Values.images.rtmgr.tag }}
          imagePullPolicy: {{ .Values.images.rtmgr.pullPolicy }}
          env:
            - name: RMR_SEED_RT
              value: /uta_rtg_ric.rt
            - name: CFGFILE
              value: /cfg/rtmgr-config.yaml
            - name: RTFILE
              value: /db/rt.json
            - name: DBAAS_SERVICE_HOST
              value: ric-dbaas
            - name: DBAAS_SERVICE_PORT
              value: "6379"
            # Inject submgr's ClusterIP so the hostAliases initContainer
            # substitution works. See TODO.md for a cleaner long-term fix.
            - name: RIC_SUBMGR_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP  # placeholder — overridden by initContainer
          ports:
            - containerPort: 3800
              name: http
            - containerPort: 4560
              name: rmr
          volumeMounts:
            - name: rtmgr-config
              mountPath: /cfg/rtmgr-config.yaml
              subPath: rtmgr-config.yaml
            - name: rtmgr-config
              mountPath: /db/rt.json
              subPath: rt.json
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: rtmgr-config
          configMap:
            name: rtmgr-config
        - name: shared
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ric-rtmgr
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-rtmgr
spec:
  selector:
    app: ric-rtmgr
  ports:
    - name: http
      port: 3800
      targetPort: 3800
    - name: rmr
      port: 4560
      targetPort: 4560
---
# --- E2TERM (E2 Termination) --------------------------------------------------
# Two Services:
#   1. ric-e2term (ClusterIP) — RMR ports for internal RIC communication
#   2. e2term (LoadBalancer, SCTP) — external E2 endpoint for the DU
#
# The initContainer sleep implements the documented 5-second startup delay.
# RIC_E2TERM_SERVICE_HOST uses the Downward API to get the pod's own IP,
# replacing the hardcoded 172.22.0.210 from docker-compose.ric.yml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ric-e2term
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-e2term
    app.kubernetes.io/part-of: oran-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ric-e2term
  template:
    metadata:
      labels:
        app: ric-e2term
    spec:
      initContainers:
        - name: wait-for-e2mgr
          image: alpine:3.19
          command: ["sh", "-c", "until wget -qO- http://ric-e2mgr:3800/v1/health; do echo waiting for e2mgr; sleep 3; done"]
        # The 5-second sleep ensures e2mgr's RMR outbound connection to
        # e2term:3801 is established before e2term opens the SCTP port.
        # Without this, the first E2_TERM_KEEP_ALIVE_RESP fails with
        # RMR_ERR_NOENDPT and triggers the keep-alive death spiral.
        # See docs/LEARNINGS.md for the full diagnosis.
        - name: startup-delay
          image: busybox:1.36
          command: ["sleep", {{ .Values.e2termStartupDelaySec | quote }}]
      containers:
        - name: e2term
          image: {{ .Values.images.e2term.repository }}:{{ .Values.images.e2term.tag }}
          imagePullPolicy: {{ .Values.images.e2term.pullPolicy }}
          command: ["sh", "-c", "./startup.sh"]
          securityContext:
            privileged: true
          env:
            - name: RMR_SEED_RT
              value: /opt/e2/config/dockerRouter.txt
            - name: RMR_SRC_ID
              value: ric-e2term
            - name: E2TERM_POD_NAME
              value: ric-e2term
            - name: POD_NAME
              value: ric-e2term
            - name: LD_LIBRARY_PATH
              value: /usr/local/lib
            - name: DBAAS_SERVICE_HOST
              value: ric-dbaas
            - name: DBAAS_SERVICE_PORT
              value: "6379"
            # Downward API: inject the pod's own IP as the bind address.
            # Replaces the hardcoded 172.22.0.210 from docker-compose.ric.yml.
            - name: RIC_E2TERM_SERVICE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 38000
              name: rmr
            - containerPort: 36421
              name: e2-sctp
              protocol: SCTP
            - containerPort: 8088
              name: metrics
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: e2term-config
              mountPath: /opt/e2/config
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
      volumes:
        - name: e2term-config
          configMap:
            name: e2term-config
---
# Internal RMR service for e2term — used by other RIC components.
apiVersion: v1
kind: Service
metadata:
  name: ric-e2term
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-e2term
spec:
  selector:
    app: ric-e2term
  ports:
    - name: rmr
      port: 38000
      targetPort: 38000
    - name: metrics
      port: 8088
      targetPort: 8088
---
# External SCTP service for E2 interface — DU connects here.
# Named 'e2term' (without 'ric-' prefix) to match .Values.e2termAddress
# in the ran chart: "e2term.near-rt-ric.svc.cluster.local"
apiVersion: v1
kind: Service
metadata:
  name: e2term
  namespace: {{ .Values.namespace }}
  labels:
    app: ric-e2term
  annotations:
    cloud.google.com/load-balancer-type: "External"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: ric-e2term
  ports:
    - name: e2-sctp
      port: 36421
      targetPort: 36421
      protocol: SCTP
---
# --- A1MEDIATOR (A1 Policy Interface) ----------------------------------------
