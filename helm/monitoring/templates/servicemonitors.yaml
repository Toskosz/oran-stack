# ============================================================================
# ServiceMonitors — O-RAN stack metrics endpoints
# ============================================================================
# These tell Prometheus (via the Operator) which pods/services to scrape.
#
# All target services already expose /metrics on the ports below — they were
# wired in the 5g-core and near-rt-ric charts but never scraped until now.
#
# Ports scraped:
#   Open5GS NFs (AMF, SMF, UPF, PCF)  — port 9090  (Prometheus pull)
#   Near-RT RIC (e2term, submgr)        — port 8088  (Prometheus pull)
# ============================================================================

# --- Open5GS AMF -------------------------------------------------------------
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: open5gs-amf
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: oran-stack
spec:
  namespaceSelector:
    matchNames:
      - 5g-core
  selector:
    matchLabels:
      app: amf
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
---
