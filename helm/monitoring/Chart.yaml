apiVersion: v2
name: monitoring
description: >
  Prometheus + Grafana observability stack for the O-RAN lab.

  Deploys kube-prometheus-stack (Prometheus Operator + Grafana) and wires up
  ServiceMonitors for the metrics endpoints already exposed by:
    - Open5GS NFs (AMF, SMF, UPF, PCF) — port 9090
    - Near-RT RIC (e2term, submgr)       — port 8088

  Also ships a Grafana dashboard ConfigMap for O-RAN KPIs.
type: application
version: 0.1.0
appVersion: "kube-prometheus-stack-58.x"

dependencies:
  - name: kube-prometheus-stack
    version: ">=58.0.0 <60.0.0"
    repository: https://prometheus-community.github.io/helm-charts
