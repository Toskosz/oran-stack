version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    container_name: 5g-mongodb
    restart: unless-stopped
    ports:
    - 27017:27017
    volumes:
    - mongodb_data:/data/db
    - mongodb_config:/data/configdb
    - ./init-mongodb.js:/docker-entrypoint-initdb.d/init-rs.js:ro
    networks:
      5g-core-network:
        ipv4_address: 172.20.0.254
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: mongod --replSet rs0
  5g-core-webui:
    image: open5gs-webui:latest
    container_name: 5g-core-webui
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017/open5gs
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: '9999'
    networks:
      5g-core-network:
        ipv4_address: 172.20.0.16
    ports:
    - 9999:9999
    volumes:
    - /var/log/open5gs:/var/log/open5gs
    stdin_open: true
    tty: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9999/
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  5g-core-nrf:
    image: teste-core:latest
    container_name: 5g-core-nrf
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SKIP_MONGODB: 'true'
      MONGODB_URI: mongodb://mongodb:27017/open5gs
      MCC: '001'
      MNC: '01'
      TAC: '1'
      AMF_REGION: '2'
      AMF_SET: '1'
      SMF_SUBNET4: 10.45.0.0/16
      SMF_SUBNET6: 2001:db8:cafe::/48
      UPF_IP: 172.20.0.7
      MME_GID: '2'
      MME_CODE: '1'
      LOG_LEVEL: info
    networks:
      5g-core-network:
        ipv4_address: 172.20.0.10
    cap_add:
    - NET_ADMIN
    - SYS_ADMIN
    - NET_RAW
    devices:
    - /dev/net/tun:/dev/net/tun
    privileged: true
    stdin_open: true
    tty: true
    volumes:
    - ./configs:/open5gs/configs:ro
    - /var/log/open5gs:/var/log/open5gs
    working_dir: /open5gs
    command: ./install/bin/open5gs-nrfd -c /open5gs/install/etc/open5gs/nrf.yaml
