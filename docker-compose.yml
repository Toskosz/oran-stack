version: '3.8'

services:
  # Shared MongoDB instance for all 5G core network functions
  mongodb:
    image: mongo:7.0
    container_name: 5g-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init-mongodb.js:/docker-entrypoint-initdb.d/init-rs.js:ro
    networks:
      - 5g-core-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: mongod --replSet rs0

  # 5G Core Network Function Container (example: can run any NF)
  5g-core:
    image: teste-core:latest
    container_name: 5g-core-nf
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      # Tell the container to skip local MongoDB startup and use the shared one
      SKIP_MONGODB: "true"
      # MongoDB connection string for Open5GS (no auth for simple setup)
      MONGODB_URI: "mongodb://mongodb:27017/open5gs"
    networks:
      - 5g-core-network
    # TUN device access from host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    devices:
      # If TUN interfaces are created on host, they appear here
      - /dev/net/tun:/dev/net/tun
    # Privileged mode needed for network namespace manipulation
    privileged: true
    stdin_open: true
    tty: true
    volumes:
      # Mount TUN interfaces from host (these need to be created on host first)
      # For now, the container will try to create them if needed
      - /var/log/open5gs:/var/log/open5gs
    working_dir: /open5gs

networks:
  5g-core-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
