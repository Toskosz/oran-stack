version: '3.8'
x-open5gs-common-env: &open5gs-common-env
  SKIP_MONGODB: 'true'
  MONGODB_URI: ${MONGODB_URI}
  MCC: ${MCC}
  MNC: ${MNC}
  TAC: ${TAC}
  AMF_REGION: ${AMF_REGION}
  AMF_SET: ${AMF_SET}
  AMF_IP: ${AMF_IP}
  AMF_SBI_PORT: ${AMF_SBI_PORT}
  AMF_NGAP_PORT: ${AMF_NGAP_PORT}
  AMF_METRICS_PORT: ${AMF_METRICS_PORT}
  NRF_IP: ${NRF_IP}
  NRF_SBI_PORT: ${NRF_SBI_PORT}
  SCP_IP: ${SCP_IP}
  SCP_SBI_PORT: ${SCP_SBI_PORT}
  SEPP_IP: ${SEPP_IP}
  SMF_SUBNET4: ${SMF_SUBNET4}
  SMF_SUBNET6: ${SMF_SUBNET6}
  UPF_IP: ${UPF_IP}
  SMF2_SUBNET4: ${SMF2_SUBNET4}
  SMF2_SUBNET6: ${SMF2_SUBNET6}
  UPF2_IP: ${UPF2_IP}
  SMF2_IP: ${SMF2_IP}
  SMF2_SBI_PORT: ${SMF2_SBI_PORT}
  MME_GID: ${MME_GID}
  MME_CODE: ${MME_CODE}
  LOG_LEVEL: ${LOG_LEVEL}
services:
  mongodb:
    image: mongo:7.0
    container_name: 5g-mongodb
    restart: unless-stopped
    ports:
    - 27017:27017
    volumes:
    - mongodb_data:/data/db
    - mongodb_config:/data/configdb
    - ./init-mongodb.js:/docker-entrypoint-initdb.d/init-rs.js:ro
    - ./init-webui-data.js:/docker-entrypoint-initdb.d/init-webui-data.js:ro
    networks:
      5g-core-network:
        ipv4_address: ${MONGODB_IP}
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: mongod --replSet rs0
  5g-core-webui:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.webui
    image: open5gs-webui:latest
    container_name: 5g-core-webui
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DB_URI: ${MONGODB_URI}
      MONGODB_URI: ${MONGODB_URI}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: '9999'
    networks:
      5g-core-network:
        ipv4_address: ${WEBUI_IP}
    ports:
    - 9999:9999
    volumes:
    - /var/log/open5gs:/var/log/open5gs
    stdin_open: true
    tty: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9999/
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  5g-core-nrf:
    image: teste-core:latest
    container_name: 5g-core-nrf
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      <<: *open5gs-common-env
    networks:
      5g-core-network:
        ipv4_address: ${NRF_IP}
    cap_add:
    - NET_ADMIN
    - SYS_ADMIN
    - NET_RAW
    devices:
    - /dev/net/tun:/dev/net/tun
    privileged: true
    stdin_open: true
    tty: true
    volumes:
    - ./configs:/open5gs/configs:ro
    - /var/log/open5gs:/var/log/open5gs
    working_dir: /open5gs
    command: ./install/bin/open5gs-nrfd -c /open5gs/install/etc/open5gs/nrf.yaml
  5g-core-scp:
    image: teste-core:latest
    container_name: 5g-core-scp
    depends_on:
      5g-core-nrf:
        condition: service_started
    restart: unless-stopped
    environment:
      <<: *open5gs-common-env
    networks:
      5g-core-network:
        ipv4_address: ${SCP_IP}
    cap_add:
    - NET_ADMIN
    - SYS_ADMIN
